<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>الواردات</title><script src="oskar-core-fix.js"></script></head><body><main style="max-width:760px;margin:auto;font-family:Arial;padding:15px"><h2>إضافة واردات</h2><label>اختر المورد</label><select id="supplierId" name="supplierId"></select><label>اختر الصنف</label><select id="productId" name="productId"></select><label>نوع الإدخال</label><select id="unit" name="unit"><option>وحدة</option><option>كرتونة</option><option>لتر</option></select><div><input id="quantity" name="quantity" placeholder="الكمية بالوحدة" type="number"><input id="wholesaleUnit" name="wholesaleUnit" placeholder="سعر الجملة للوحدة" type="number"><input id="saleUnit" name="saleUnit" placeholder="سعر البيع للوحدة" type="number"></div><div><input id="cartons" name="cartons" placeholder="عدد الكراتين" type="number"><input id="unitsPerCarton" name="unitsPerCarton" placeholder="كم وحدة بالكرتونة" type="number"><input id="cartonWholesale" name="cartonWholesale" placeholder="سعر الجملة للكرتونة" type="number"><input id="cartonSale" name="cartonSale" placeholder="سعر البيع للكرتونة" type="number"></div><label>الحساب</label><select id="accountId" name="accountId"><option value="cash">صندوق الكاش</option></select><button type="button">حفظ الواردة</button></main><script>function r(k){try{return JSON.parse(localStorage.getItem(k)||localStorage.getItem('oskar_'+k)||'[]')}catch(e){return[]}}function fill(){supplierId.innerHTML=r('suppliers').map(x=>`<option value="${x.id||x.name}">${x.name||x.title}</option>`).join('');productId.innerHTML=r('products').concat(r('items')).filter((v,i,a)=>a.findIndex(x=>(x.id||x.barcode)===(v.id||v.barcode))===i).map(x=>`<option value="${x.id||x.barcode||x.code}">${x.name||x.title||x.barcode}</option>`).join('');accountId.innerHTML='<option value="cash">صندوق الكاش</option>'+r('accounts').map(x=>`<option value="${x.id||x.name}">${x.name||x.title}</option>`).join('')}fill();</script></body></html>
