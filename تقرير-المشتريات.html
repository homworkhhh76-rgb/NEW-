ween;align-items:center;margin-bottom:12px}.modal-head h3{margin:0}.close{border:0;background:#f3f4f6;border-radius:9px;width:36px;height:36px}.toast{position:fixed;left:16px;bottom:16px;background:#0f172a;color:white;padding:12px 14px;border-radius:12px;z-index:300;display:none}.toast.show{display:block}.cart{display:grid;grid-template-columns:1.3fr .7fr;gap:14px}.cart-lines{min-height:230px}.line{display:grid;grid-template-columns:1fr 90px 90px 40px;gap:8px;align-items:center;border-bottom:1px solid #edf0f3;padding:8px 0}.print-only{display:none}@media(max-width:800px){.stats{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.cart{grid-template-columns:1fr}.page{padding:10px}.page-title h1{font-size:20px}.top-chip.hide-sm{display:none}.sidebar{width:315px}.data-table{min-width:760px}}@media print{.topbar,.sidebar,.drawer-overlay,.toolbar,.filter-strip,.no-print{display:none!important}.page{max-width:none;padding:0}.card{box-shadow:none;border:0}.print-only{display:block}body{background:#fff}.data-table{min-width:0}.table-wrap{overflow:visible}}

    const PAGE_KIND = "purchases-report";
    const PAGE_SECTION = "المشتريات";
  </script>
  <script>
const MENU = [{"title": "الرئيسية", "icon": "⌂", "items": [["الرئيسية", "الرئيسية.html", "home"], ["لوحة المتابعة", "لوحة-المتابعة.html", "dashboard"]]}, {"title": "الأصناف", "icon": "▦", "items": [["إضافة صنف", "إضافة-صنف.html", "add-product"], ["كل الأصناف", "كل-الأصناف.html", "products"], ["نقل مخزني", "نقل-مخزني.html", "generic"], ["المخزون التالف", "المخزون-التالف.html", "generic"], ["طلبات الأصناف", "طلبات-الأصناف.html", "generic"], ["وحدات الأصناف", "وحدات-الأصناف.html", "generic"], ["مجموعات الأصناف", "مجموعات-الأصناف.html", "generic"], ["تحديث الأسعار", "تحديث-الأسعار.html", "generic"], ["مجموعات الأسعار", "مجموعات-الأسعار.html", "generic"], ["حركات الأصناف", "حركات-الأصناف.html", "generic"], ["ضمانات الأصناف", "ضمانات-الأصناف.html", "generic"], ["تقارير الأصناف", "تقارير-الأصناف.html", "generic"], ["استيراد بيانات الأصناف", "استيراد-بيانات-الأصناف.html", "generic"], ["استيراد كميات افتتاحية", "استيراد-كميات-افتتاحية.html", "generic"]]}, {"title": "المبيعات", "icon": "🛒", "items": [["إضافة مبيعات", "إضافة-مبيعات.html", "sale"], ["كل المبيعات", "كل-المبيعات.html", "sales-list"], ["سجل الكاشير", "سجل-الكاشير.html", "cashier-log"], ["الكاشير", "الكاشير.html", "cashier"], ["مسودات البيع", "مسودات-البيع.html", "generic"], ["عروض الأسعار", "عروض-الأسعار.html", "generic"], ["مرجع المبيعات", "مرجع-المبيعات.html", "generic"], ["الشحن والتوصيل", "الشحن-والتوصيل.html", "generic"], ["خصومات ترويجية", "خصومات-ترويجية.html", "generic"], ["استيراد بيانات المبيعات", "استيراد-بيانات-المبيعات.html", "generic"], ["تقرير المبيعات مفصل", "تقرير-المبيعات-مفصل.html", "sales-report"]]}, {"title": "المشتريات", "icon": "⇩", "items": [["إضافة مشتريات", "إضافة-مشتريات.html", "purchase"], ["كل المشتريات", "كل-المشتريات.html", "purchases-list"], ["مرجع المشتريات", "مرجع-المشتريات.html", "generic"], ["تقرير المشتريات", "تقرير-المشتريات.html", "purchases-report"], ["قائمة المصاريف", "قائمة-المصاريف.html", "expenses-list"], ["إضافة المصاريف", "إضافة-المصاريف.html", "expense"], ["فئات المصاريف", "فئات-المصاريف.html", "generic"], ["تقرير المصاريف", "تقرير-المصاريف.html", "expenses-report"]]}, {"title": "المستخدمين", "icon": "👥", "items": [["المستخدمين", "المستخدمين.html", "employees"], ["إضافة موظف", "إضافة-موظف.html", "add-employee"], ["كل الموظفين", "كل-الموظفين.html", "employees"], ["صلاحيات الموظفين", "صلاحيات-الموظفين.html", "generic"], ["سجل نشاطات الموظفين", "سجل-نشاطات-الموظفين.html", "activity-log"]]}, {"title": "إدارة الحسابات", "icon": "▣", "items": [["إدارة الحسابات", "إدارة-الحسابات.html", "accounts"], ["إضافة حساب", "إضافة-حساب.html", "add-account"], ["سجل أرصدة الحسابات", "سجل-أرصدة-الحسابات.html", "transactions"], ["حركة الحسابات", "حركة-الحسابات.html", "transactions"]]}, {"title": "العملاء", "icon": "☏", "items": [["العملاء", "العملاء.html", "customers"], ["إضافة عميل", "إضافة-عميل.html", "generic"], ["ديون العملاء", "ديون-العملاء.html", "debts"], ["دفعات العملاء", "دفعات-العملاء.html", "customer-payments"]]}, {"title": "الموردين", "icon": "▤", "items": [["الموردين", "الموردين.html", "suppliers"], ["إضافة مورد", "إضافة-مورد.html", "generic"], ["دفعات التجار", "دفعات-التجار.html", "supplier-payment"]]}, {"title": "تقارير إضافية", "icon": "▥", "items": [["تقارير إضافية", "تقارير-إضافية.html", "reports"], ["تقرير الأرباح", "تقرير-الأرباح.html", "profit-report"], ["تقرير المخزون", "تقرير-المخزون.html", "stock-report"], ["تقرير الديون", "تقرير-الديون.html", "debts-report"], ["تقرير الحسابات", "تقرير-الحسابات.html", "accounts-report"]]}, {"title": "إعدادات", "icon": "⚙", "items": [["الإعدادات", "الإعدادات.html", "settings"], ["الإعدادات الرئيسية", "الإعدادات-الرئيسية.html", "settings"], ["فروع المخازن", "فروع-المخازن.html", "generic"], ["شكل الفاتورة", "شكل-الفاتورة.html", "generic"], ["إعدادات الباركود", "إعدادات-الباركود.html", "generic"], ["طابعات الإيصالات", "طابعات-الإيصالات.html", "generic"], ["معدلات الضرائب", "معدلات-الضرائب.html", "generic"]]}];
const APP_PREFIX = 'cashier_multi_html_v1_';
const $ = (s, r=document)=>r.querySelector(s);
const $$ = (s, r=document)=>Array.from(r.querySelectorAll(s));
const uid = (p='id') => p + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7);
const today = () => new Date().toISOString().slice(0,10);
const nowText = () => new Date().toLocaleString('ar', {hour12:false});
const money = n => '₪ ' + (Number(n||0)).toFixed(2);
function getStore(){
  const raw = localStorage.getItem(APP_PREFIX+'store');
  let s = raw ? JSON.parse(raw) : null;
  if(!s){
    s = {settings:{shopName:'سوبرماركت', defaultAccount:'cash'}, accounts:[], transactions:[], products:[], sales:[], purchases:[], expenses:[], employees:[], customers:[], suppliers:[], logs:[], syncQueue:[]};
  }
  if(!s.accounts.find(a=>a.id==='cash')) s.accounts.unshift({id:'cash', number:'1001', name:'الصندوق الرئيسي', type:'الأصول', subType:'الأصول المتداولة', openingBalance:0, status:'نشط', notes:'حساب الكاش الافتراضي', createdAt:nowText()});
  if(!s.products.length){s.products.push({id:uid('prod'), sku:'85565', name:'صنف تجريبي', branch:'سوبرماركت', group:'الرئيسية', unit:'كيلو', buy:1, sell:1.25, stock:0, status:'نشط'});}
  if(!s.employees.length){s.employees.push({id:'admin', name:'Ahmed Nada', role:'مدير', status:'نشط', permissions:['all']});}
  return s;
}
function saveStore(s){localStorage.setItem(APP_PREFIX+'store', JSON.stringify(s)); updateSyncBadge();}
function addLog(action, subject='عام', note=''){
  const s=getStore(); s.logs.unshift({id:uid('log'), date:nowText(), subject, action, by:localStorage.getItem(APP_PREFIX+'user')||'Ahmed Nada', note});
  s.logs=s.logs.slice(0,500); saveStore(s);
}
function addQueue(type, payload){const s=getStore(); s.syncQueue.unshift({id:uid('sync'), type, payload, date:nowText(), status:'بانتظار المزامنة'}); saveStore(s);}
function calcAccountBalance(accountId){const s=getStore(); const acc=s.accounts.find(a=>a.id===accountId); let bal=Number(acc?.openingBalance||0); s.transactions.filter(t=>t.accountId===accountId).forEach(t=>{bal += t.direction==='in' ? Number(t.amount||0) : -Number(t.amount||0)}); return bal;}
function recordTransaction({accountId='cash', direction='in', amount=0, source='عام', refId='', note=''}){
  amount=Number(amount||0); if(amount<=0) return;
  const s=getStore(); const before=calcAccountBalance(accountId); const after=direction==='in'? before+amount : before-amount;
  s.transactions.unshift({id:uid('tr'), date:nowText(), accountId, direction, amount, source, refId, note, before, after});
  saveStore(s); addQueue('transaction', {accountId,direction,amount,source,refId,note});
}
function accountOptions(selected='cash'){
  const s=getStore();
  return s.accounts.map(a=>`<option value="${a.id}" ${a.id===selected?'selected':''}>${a.name} - ${money(calcAccountBalance(a.id))}</option>`).join('');
}
function toast(msg){const t=$('#toast'); if(!t)return; t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600);}
function playBeep(){try{const a=new Audio('./qr.mp3'); a.volume=.55; a.play().catch(()=>{});}catch(e){}}
function updateSyncBadge(){const s=getStore(); const el=$('#syncCount'); if(el) el.textContent=s.syncQueue.filter(x=>x.status!=='تمت').length; const st=$('#onlineState'); if(st) st.textContent=navigator.onLine?'متصل':'أوفلاين';}
function initLayout(){
  document.title = PAGE_TITLE + ' - نظام كاشير';
  $('#pageTitle').textContent = PAGE_TITLE;
  $('#pageCrumb').textContent = PAGE_SECTION + ' / ' + PAGE_TITLE;
  $('#shopNameTop').textContent = getStore().settings.shopName || 'سوبرماركت';
  buildSidebar();
  $('#hamburger').onclick=()=>openDrawer(); $('#drawerOverlay').onclick=()=>closeDrawer();
  window.addEventListener('online',()=>{updateSyncBadge(); toast('عاد الاتصال، يمكنك المزامنة الآن');});
  window.addEventListener('offline',()=>{updateSyncBadge(); toast('أنت الآن بدون إنترنت، سيتم الحفظ محلياً');});
  $('#syncBtn').onclick=syncNow; $('#printBtn').onclick=()=>window.print();
  if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
  updateSyncBadge();
}
function buildSidebar(){
  const side=$('#sideMenu'); let html='';
  html += `<a class="simple-link" href="الرئيسية.html"><span>الرئيسية</span><b>⌂</b></a><a class="simple-link" href="لوحة-المتابعة.html"><span>لوحة المتابعة</span><b>⌑</b></a>`;
  MENU.slice(1).forEach(sec=>{
    const activeSec = sec.title===PAGE_SECTION || sec.items.some(i=>i[1]===PAGE_FILE);
    const green = ['إدارة الحسابات','تقارير إضافية','إعدادات'].includes(sec.title) ? 'green-icon' : '';
    html += `<div class="menu-section"><button class="menu-main ${activeSec?'active':''} ${green}" data-section="${sec.title}"><span class="ico">${sec.icon}</span><span>${sec.title}</span><span class="arrow">${activeSec?'⌄':'‹'}</span></button><div class="submenu ${activeSec?'open':''}">`;
    sec.items.forEach(([label,file])=>{ html += `<a class="${file===PAGE_FILE?'active':''}" href="${file}">${label}</a>`; });
    html += `</div></div>`;
  });
  side.innerHTML=html;
  $$('.menu-main',side).forEach(btn=>btn.onclick=()=>{const sub=btn.nextElementSibling; sub.classList.toggle('open'); btn.querySelector('.arrow').textContent=sub.classList.contains('open')?'⌄':'‹';});
}
function openDrawer(){$('#drawerOverlay').classList.add('show'); $('#sidebar').classList.add('open');}
function closeDrawer(){$('#drawerOverlay').classList.remove('show'); $('#sidebar').classList.remove('open');}
function modal(title, body, onSave){
  $('#modalTitle').textContent=title; $('#modalBody').innerHTML=body; $('#modal').classList.add('show');
  $('#modalSave').onclick=()=>{ if(onSave) onSave(); };
}
function closeModal(){$('#modal').classList.remove('show');}
function tableTools(tableId, filename){
  return `<button class="btn gray small" onclick="exportTable('${tableId}','csv','${filename}')">تصدير CSV</button><button class="btn gray small" onclick="exportTable('${tableId}','xls','${filename}')">تصدير Excel</button><button class="btn gray small" onclick="window.print()">طباعة</button><button class="btn gray small" onclick="toast('إخفاء الأعمدة جاهز للتطوير حسب حاجتك')">إدارة الأعمدة</button>`;
}
function exportTable(tableId, type='csv', filename='export'){
  const table=document.getElementById(tableId); if(!table) return toast('لا يوجد جدول للتصدير');
  const rows=[...table.querySelectorAll('tr')].map(tr=>[...tr.children].map(td=>'"'+td.innerText.replaceAll('"','""')+'"').join(','));
  const blob=new Blob([rows.join('\n')],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename+'.'+(type==='xls'?'xls':'csv'); a.click(); URL.revokeObjectURL(a.href); addLog('تصدير جدول', PAGE_TITLE, filename);
}
async function syncNow(){
  const s=getStore(); const pending=s.syncQueue.filter(x=>x.status!=='تمت');
  if(!navigator.onLine){toast('لا يوجد إنترنت، البيانات محفوظة محلياً'); return;}
  $('#syncBtn').disabled=true; toast('جاري المزامنة مع Firebase...');
  try{
    if(!window.CASHIER_FIREBASE_CONFIG) throw new Error('ملف firebase-config.js غير موجود');
    const [{initializeApp}, dbMod] = await Promise.all([
      import('https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js'),
      import('https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js')
    ]);
    const app = initializeApp(window.CASHIER_FIREBASE_CONFIG.firebaseConfig);
    const db = dbMod.getDatabase(app);
    const root = window.CASHIER_FIREBASE_CONFIG.firebaseRoot || 'cashier_app';
    await dbMod.set(dbMod.ref(db, root + '/multi_page_app/local_backup'), {...s, lastSync: nowText()});
    s.syncQueue = s.syncQueue.map(q=>({...q,status:'تمت'})); saveStore(s); addLog('مزامنة Firebase','النظام','تم رفع النسخة المحلية'); toast('تمت المزامنة بنجاح');
  }catch(e){console.warn(e); toast('تعذر الاتصال بفايربيز، بقيت البيانات محلية');}
  $('#syncBtn').disabled=false; updateSyncBadge();
}

function renderExpensePage(){ $('#content').innerHTML=`<div class="card"><div class="form-grid"><div class="field"><label>فئة المصروف</label><input id="exCat" class="input" placeholder="مثلاً كهرباء"></div><div class="field"><label>المبلغ</label><input id="exAmount" type="number" class="input" value="0"></div><div class="field"><label>حساب الدفع</label><select id="exAccount" class="select">${accountOptions()}</select></div><div class="field"><label>ملاحظات</label><input id="exNote" class="input"></div></div><br><button class="btn primary" onclick="saveExpense()">حفظ المصروف وخصم من الحساب</button></div>`;}
function saveExpense(){const s=getStore(); const amount=Number($('#exAmount').value||0); const ex={id:uid('ex'),date:nowText(),category:$('#exCat').value||'مصروف',amount,accountId:$('#exAccount').value,note:$('#exNote').value}; s.expenses.unshift(ex); saveStore(s); recordTransaction({accountId:ex.accountId,direction:'out',amount,source:'مصروفات',refId:ex.id,note:ex.category}); addLog('إضافة مصروف','المصروفات',money(amount)); addQueue('expense',ex); toast('تم حفظ المصروف وخصم الصادر'); renderExpensePage();}
function renderExpensesList(){const s=getStore(); $('#content').innerHTML=`<div class="card">${pageHeaderTools()}<div class="table-wrap"><table id="mainTable" class="data-table"><thead><tr><th>التاريخ</th><th>الفئة</th><th>المبلغ</th><th>حساب الدفع</th><th>ملاحظات</th></tr></thead><tbody>${s.expenses.map(x=>`<tr><td>${x.date}</td><td>${x.category}</td><td>${money(x.amount)}</td><td>${s.accounts.find(a=>a.id===x.accountId)?.name||''}</td><td>${x.note||''}</td></tr>`).join('')||'<tr><td colspan="5" class="empty">لا توجد مصاريف</td></tr>'}</tbody></table></div></div>`; searchFilter('searchBox','mainTable');}
function renderSupplierPayment(){ $('#content').innerHTML=`<div class="card"><div class="form-grid"><div class="field"><label>اسم التاجر</label><input id="spName" class="input"></div><div class="field"><label>المبلغ</label><input id="spAmount" type="number" class="input" value="0"></div><div class="field"><label>من حساب</label><select id="spAccount" class="select">${accountOptions()}</select></div><div class="field"><label>ملاحظات</label><input id="spNote" class="input"></div></div><br><button class="btn primary" onclick="saveSupplierPayment()">حفظ دفعة تاجر وخصم من الحساب</button></div>`;}
function saveSupplierPayment(){const amount=Number($('#spAmount').value||0); recordTransaction({accountId:$('#spAccount').value,direction:'out',amount,source:'دفعات التجار',note:$('#spName').value+' '+$('#spNote').value}); addLog('دفعة تاجر','الموردين',money(amount)); toast('تم خصم الدفعة من الحساب');}
function renderActivityLog(){const s=getStore(); $('#content').innerHTML=`<div class="filter-strip">⚱ التصفية</div><div class="card">${pageHeaderTools()}<div class="table-wrap"><table id="mainTable" class="data-table"><thead><tr><th>التاريخ</th><th>نوع الموضوع</th><th>خيار</th><th>بواسطة</th><th>ملاحظة</th></tr></thead><tbody>${s.logs.map(l=>`<tr><td>${l.date}</td><td>${l.subject}</td><td>${l.action}</td><td>${l.by}</td><td>${l.note||''}</td></tr>`).join('')||'<tr><td colspan="5" class="empty">لا توجد بيانات متاحة في الجدول</td></tr>'}</tbody></table></div><div class="table-footer"><span>عرض 0 إلى ${s.logs.length} من ${s.logs.length} إدخالات</span><span><button class="btn gray small">السابق</button><button class="btn gray small">التالي</button></span></div></div>`; searchFilter('searchBox','mainTable');}
function renderEmployees(){const s=getStore(); $('#content').innerHTML=`<div class="card"><div class="toolbar"><button class="btn primary" onclick="addEmployee()">+ إضافة موظف</button>${tableTools('mainTable','الموظفين')}<input id="searchBox" class="input" placeholder="بحث ..." style="margin-right:auto;max-width:230px"></div><div class="table-wrap"><table id="mainTable" class="data-table"><thead><tr><th>الاسم</th><th>الدور</th><th>الحالة</th><th>الصلاحيات</th><th>إجراءات</th></tr></thead><tbody>${s.employees.map(e=>`<tr><td>${e.name}</td><td>${e.role}</td><td><span class="badge green">${e.status}</span></td><td>${(e.permissions||[]).join('، ')}</td><td><button class="btn gray small">تعديل</button></td></tr>`).join('')}</tbody></table></div></div>`; searchFilter('searchBox','mainTable');}
function addEmployee(){const name=prompt('اسم الموظف'); if(!name)return; const s=getStore(); s.employees.push({id:uid('emp'),name,role:'موظف',status:'نشط',permissions:['الكاشير']}); saveStore(s); addLog('إضافة موظف','المستخدمين',name); renderEmployees();}
function renderSettings(){const st=getStore().settings; $('#content').innerHTML=`<div class="card"><div class="form-grid"><div class="field"><label>اسم المحل</label><input id="setShop" class="input" value="${st.shopName||''}"></div><div class="field"><label>الحساب الافتراضي</label><select id="setAcc" class="select">${accountOptions(st.defaultAccount||'cash')}</select></div><div class="field full"><label>ملاحظة</label><input class="input" value="ملف Firebase منفصل: firebase-config.js" readonly></div></div><br><button class="btn primary" onclick="saveSettings()">حفظ الإعدادات</button><button class="btn gray" onclick="playBeep()">تجربة صوت الكاشير</button></div>`;}
function saveSettings(){const s=getStore(); s.settings.shopName=$('#setShop').value||'سوبرماركت'; s.settings.defaultAccount=$('#setAcc').value; saveStore(s); addLog('تعديل إعدادات','الإعدادات','بيانات المحل'); toast('تم حفظ الإعدادات محلياً'); initLayout();}
function renderReports(){const s=getStore(); const incoming=s.transactions.filter(t=>t.direction==='in').reduce((a,b)=>a+Number(b.amount||0),0); const outgoing=s.transactions.filter(t=>t.direction==='out').reduce((a,b)=>a+Number(b.amount||0),0); $('#content').innerHTML=`<div class="stats"><div class="stat"><span>إجمالي الوارد</span><b class="green">${money(incoming)}</b></div><div class="stat"><span>إجمالي الصادر</span><b class="red">${money(outgoing)}</b></div><div class="stat"><span>الصافي</span><b class="blue">${money(incoming-outgoing)}</b></div><div class="stat"><span>عدد الحركات</span><b>${s.transactions.length}</b></div></div><div class="card"><a class="btn primary" href="تقرير-الحسابات.html">تقرير الحسابات</a><a class="btn primary" href="تقرير-الأرباح.html">تقرير الأرباح</a><a class="btn primary" href="تقرير-المخزون.html">تقرير المخزون</a></div>`;}
function renderGeneric(){ $('#content').innerHTML=`<div class="filter-strip">⚱ التصفية</div><div class="card"><div class="toolbar">${tableTools('mainTable', PAGE_TITLE)}<input id="searchBox" class="input" placeholder="بحث ..." style="margin-right:auto;max-width:230px"></div><div class="table-wrap"><table id="mainTable" class="data-table"><thead><tr><th>التاريخ</th><th>النوع</th><th>البيان</th><th>الحالة</th><th>ملاحظة</th></tr></thead><tbody><tr><td colspan="5" class="empty">هذه الصفحة جاهزة ومربوطة بالقائمة. أضف المهام التفصيلية عند التنفيذ النهائي.</td></tr></tbody></table></div></div>`;}
window.openAccountModal=openAccountModal; window.quickInOut=quickInOut; window.showAccountDetails=showAccountDetails; window.exportTable=exportTable; window.openProductModal=openProductModal; window.deleteProduct=deleteProduct; window.addToCart=addToCart; window.completeSale=completeSale; window.renderCart=renderCart; window.playBeep=playBeep; window.savePurchase=savePurchase; window.saveExpense=saveExpense; window.saveSupplierPayment=saveSupplierPayment; window.addEmployee=addEmployee; window.saveSettings=saveSettings; window.closeModal=closeModal; window.syncNow=syncNow; window.toast=toast;
document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
