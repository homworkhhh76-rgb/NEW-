<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><meta name="theme-color" content="#0f9f6e"><link rel="manifest" href="manifest.webmanifest"><title>تسجيل الدخول</title><script src="firebase.js"></script><style>
:root{--green:#0f9f6e;--dark:#10251f;--bg:#edf4f1;--line:#dce8e2}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#06734f 0 128px,#edf4f1 128px);font-family:"Tajawal",system-ui,"Segoe UI",Tahoma,Arial;direction:rtl;color:var(--dark)}.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.card{width:min(680px,96vw);background:rgba(255,255,255,.97);border-radius:34px;padding:34px;box-shadow:0 26px 70px rgba(6,60,45,.22);border:1px solid #dce8e2}.logo{width:94px;height:94px;border-radius:30px;background:linear-gradient(135deg,#10b981,#047857);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:white;font-size:44px;font-weight:900;box-shadow:0 15px 30px rgba(16,185,129,.25)}.title{text-align:center;font-size:40px;margin:0;font-weight:900}.sub{text-align:center;color:#60756d;font-size:18px;margin:10px 0 24px}.roles{display:grid;grid-template-columns:1fr 1fr;gap:14px}.role-btn{height:64px;border:1px solid var(--line);border-radius:22px;background:white;font-size:24px;font-weight:900}.role-btn.active{background:linear-gradient(135deg,#10b981,#047857);color:#fff;box-shadow:0 16px 28px rgba(16,185,129,.25)}label{display:block;font-weight:900;margin:16px 0 8px}input{width:100%;height:58px;border:1px solid var(--line);background:#fbfefd;border-radius:18px;padding:0 18px;font-size:18px;font-family:inherit}.btn{width:100%;height:64px;border:0;border-radius:22px;background:linear-gradient(135deg,#10b981,#047857);color:#fff;font-size:24px;font-weight:900;margin-top:20px}.note{background:#f4fbf7;border-radius:18px;padding:16px;margin-top:18px;color:#60756d;line-height:1.8;border:1px solid #dce8e2}.toast{position:fixed;left:18px;bottom:18px;background:#062a20;color:#fff;padding:14px 18px;border-radius:16px;display:none;font-weight:900}@media(max-width:600px){.card{padding:24px;border-radius:26px}.title{font-size:32px}.role-btn{font-size:21px}}

.logo svg{display:block}.btn,.role-btn,input{transition:.18s ease}.btn:hover,.role-btn:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(16,185,129,.18)}.toast{box-shadow:0 20px 55px rgba(6,42,32,.35);border:1px solid rgba(16,185,129,.35)}

@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
body{background:radial-gradient(circle at 20% 10%,rgba(16,185,129,.28),transparent 28%),linear-gradient(180deg,#06734f 0 155px,#edf4f1 155px,#f8fbfa)!important}.card{border-radius:38px!important;box-shadow:0 30px 80px rgba(6,78,59,.24)!important}.logo{box-shadow:0 18px 40px rgba(16,185,129,.28)!important}.title{color:#10251f!important}.btn{box-shadow:0 18px 36px rgba(16,185,129,.22)!important}.note{border-radius:22px!important}
</style></head><body><div class="wrap"><div class="card"><div class="logo"><svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3l7 3v5c0 5-3 8-7 10-4-2-7-5-7-10V6l7-3Z"/><path d="M9.5 12l1.8 1.8L15 10"/></svg></div><h1 class="title">تسجيل الدخول</h1><p class="sub" id="hint">دخول المدير يحتاج مفتاح الشركة وكلمة المرور.</p><input type="hidden" id="role" value="manager"><div class="roles"><button id="btn-employee" class="role-btn" onclick="setRole('employee')">موظف</button><button id="btn-manager" class="role-btn active" onclick="setRole('manager')">مدير</button></div><div id="companyWrap"><label>مفتاح الشركة</label><input id="companyKey" placeholder="SUPER-0001"></div><div id="usernameWrap" style="display:none"><label>اسم المستخدم أو البريد</label><input id="username" placeholder="اسم المستخدم أو البريد"></div><label>كلمة المرور</label><input id="password" type="password" placeholder="كلمة المرور"><button class="btn" onclick="login()">دخول</button><div class="note">كلمة مرور المدير لأول مرة: <b>0000000000@@</b>. بعد أول دخول سيطلب النظام تغييرها إجباريًا. لا توجد أزرار تجريبية أو شراء في هذه النسخة.</div></div></div><div id="toast" class="toast"></div><script>
const APP_KEY='supermarket_pos_ar_v1';
function loadDB(){let raw=localStorage.getItem(APP_KEY);let db=raw?JSON.parse(raw):{};db.settings={storeName:'سوبرماركت',managerPassword:'0000000000@@',companyKey:'SUPER-0001',currency:'₪',forcePasswordChange:true,...(db.settings||{})};db.employees=db.employees||[{id:'manager',name:'مدير النظام',username:'admin',email:'',password:'0000000000@@',role:'Admin',permissions:['*'],active:'نشط'}];db.accounts=db.accounts||[{id:'cash-main',name:'الصندوق الرئيسي',code:'1001',type:'الأصول المتداولة',balance:0,openingBalance:0,active:'نشط'}];localStorage.setItem(APP_KEY,JSON.stringify(db));return db}
let DB=loadDB();document.getElementById('companyKey').value=DB.settings.companyKey||'SUPER-0001';function toast(m){let t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2600)}
function setRole(r){document.getElementById('role').value=r;document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));document.getElementById('btn-'+r).classList.add('active');document.getElementById('hint').textContent=r==='manager'?'دخول المدير يحتاج مفتاح الشركة وكلمة المرور.':'دخول الموظف باسم المستخدم أو البريد وكلمة المرور.';document.getElementById('usernameWrap').style.display=r==='employee'?'block':'none';document.getElementById('companyWrap').style.display=r==='manager'?'block':'none'}
function forceChangeIfNeeded(){if(DB.settings.forcePasswordChange||DB.settings.managerPassword==='0000000000@@'){let p=prompt('يجب تغيير كلمة مرور المدير الآن. اكتب كلمة مرور جديدة:');if(!p||p==='0000000000@@'||p.length<6){toast('كلمة المرور الجديدة غير صالحة');return false}DB.settings.managerPassword=p;DB.settings.forcePasswordChange=false;localStorage.setItem(APP_KEY,JSON.stringify(DB));toast('تم تغيير كلمة المرور');}return true}
function login(){let role=document.getElementById('role').value, pass=document.getElementById('password').value, user=document.getElementById('username').value.trim(), key=document.getElementById('companyKey').value.trim();if(role==='manager'){if(key!==(DB.settings.companyKey||'SUPER-0001'))return toast('مفتاح الشركة غير صحيح');if(pass===(DB.settings.managerPassword||'0000000000@@')){if(!forceChangeIfNeeded())return;localStorage.setItem('currentUser',JSON.stringify({id:'manager',name:'مدير النظام',role:'Admin',permissions:['*']}));location.href='لوحة-المتابعة.html'}else toast('كلمة مرور المدير غير صحيحة')}else{let emp=(DB.employees||[]).find(e=>(e.username===user||e.email===user)&&e.password===pass&&e.active!=='غير نشط');if(emp){localStorage.setItem('currentUser',JSON.stringify(emp));location.href='لوحة-المتابعة.html'}else toast('بيانات الموظف غير صحيحة أو الحساب غير نشط')}}

async function cloudPullBeforeLogin(companyKey){
  if(window.FirebaseBridge && navigator.onLine){
    try{ await window.FirebaseBridge.pullWithKey(companyKey || DB.settings.companyKey || 'SUPER-0001'); DB=loadDB(); }
    catch(e){ console.warn(e); }
  }
}
async function forceChangeIfNeeded(){
  if(DB.settings.forcePasswordChange||DB.settings.managerPassword==='0000000000@@'){
    let p=prompt('يجب تغيير كلمة مرور المدير الآن. اكتب كلمة مرور جديدة:');
    if(!p||p==='0000000000@@'||p.length<6){toast('كلمة المرور الجديدة غير صالحة');return false}
    DB.settings.managerPassword=p;DB.settings.forcePasswordChange=false;DB.lastLocalUpdate=new Date().toISOString();localStorage.setItem(APP_KEY,JSON.stringify(DB));
    if(window.FirebaseBridge && navigator.onLine){ try{ await window.FirebaseBridge.pushWithKey(DB.settings.companyKey||'SUPER-0001'); }catch(e){ console.warn(e); } }
    toast('تم تغيير كلمة المرور وحفظها في فايربيز');
  }
  return true
}
async function login(){
  let role=document.getElementById('role').value, pass=document.getElementById('password').value, user=document.getElementById('username').value.trim(), key=document.getElementById('companyKey').value.trim()||'SUPER-0001';
  if(role==='manager') await cloudPullBeforeLogin(key);
  if(role==='manager'){
    if(key!==(DB.settings.companyKey||'SUPER-0001'))return toast('مفتاح الشركة غير صحيح');
    if(pass===(DB.settings.managerPassword||'0000000000@@')){
      if(!(await forceChangeIfNeeded()))return;
      localStorage.setItem('currentUser',JSON.stringify({id:'manager',name:'مدير النظام',role:'Admin',permissions:['*'],companyKey:key,managerId:'manager'}));
      location.href='لوحة-المتابعة.html'
    }else toast('كلمة مرور المدير غير صحيحة')
  }else{
    const norm=s=>String(s||'').trim().toLowerCase();
    let emp=(DB.employees||[]).find(e=>(norm(e.username)===norm(user)||norm(e.email)===norm(user)||norm(e.name)===norm(user))&&String(e.password||'')===String(pass)&&e.active!=='غير نشط');
    if(emp){localStorage.setItem('currentUser',JSON.stringify({...emp,companyKey:DB.settings.companyKey||key,managerId:'manager'}));location.href='لوحة-المتابعة.html'}else toast('بيانات الموظف غير صحيحة أو الحساب غير نشط')
  }
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});


// FINAL LOGIN PATCH: يسحب بيانات الشركة قبل دخول الموظف ويدعم الاسم/البريد/اسم المستخدم مع حفظ كلمة مرور المدير في Firebase
async function finalPullForLogin(key){
  if(window.FirebaseBridge && navigator.onLine){try{await window.FirebaseBridge.pullWithKey(key||document.getElementById('companyKey').value||DB.settings.companyKey||'SUPER-0001');DB=loadDB();}catch(e){console.warn(e)}}
}
async function login(){
  let role=document.getElementById('role').value, pass=String(document.getElementById('password').value||''), user=String(document.getElementById('username').value||'').trim(), key=String(document.getElementById('companyKey').value||DB.settings.companyKey||'SUPER-0001').trim()||'SUPER-0001';
  await finalPullForLogin(key);
  if(role==='manager'){
    if(key!==(DB.settings.companyKey||'SUPER-0001'))return toast('مفتاح الشركة غير صحيح');
    if(pass===(DB.settings.managerPassword||'0000000000@@')){
      if(DB.settings.forcePasswordChange||DB.settings.managerPassword==='0000000000@@'){
        let p=prompt('يجب تغيير كلمة مرور المدير الآن. اكتب كلمة مرور جديدة:');
        if(!p||p==='0000000000@@'||p.length<6)return toast('كلمة المرور الجديدة غير صالحة');
        DB.settings.managerPassword=p;DB.settings.forcePasswordChange=false;DB.lastLocalUpdate=new Date().toISOString();localStorage.setItem(APP_KEY,JSON.stringify(DB));
        if(window.FirebaseBridge&&navigator.onLine){try{await window.FirebaseBridge.pushWithKey(key)}catch(e){console.warn(e)}}
      }
      localStorage.setItem('currentUser',JSON.stringify({id:'manager',name:'مدير النظام',role:'Admin',permissions:['*'],companyKey:key,managerId:'manager'}));location.href='لوحة-المتابعة.html';
    } else toast('كلمة مرور المدير غير صحيحة');
  } else {
    const norm=s=>String(s||'').trim().toLowerCase();
    let emp=(DB.employees||[]).find(e=>(norm(e.username)===norm(user)||norm(e.email)===norm(user)||norm(e.name)===norm(user)) && String(e.password||'')===pass && norm(e.active||'نشط')!=='غير نشط');
    if(emp){localStorage.setItem('currentUser',JSON.stringify({...emp,companyKey:DB.settings.companyKey||key,managerId:'manager'}));location.href='لوحة-المتابعة.html'}
    else toast('بيانات الموظف غير صحيحة أو الحساب غير نشط');
  }
}
</script></body></html>
