<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><meta name="theme-color" content="#0aa36d"><link rel="manifest" href="manifest.webmanifest"><title>تسجيل الدخول</title><style>
:root{--green:#00a96b;--dark:#0f172a;--bg:#eef6ff}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0aa36d 0 120px,#eef6ff 120px);font-family:system-ui,"Segoe UI",Tahoma,Arial;direction:rtl;color:var(--dark)}.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.card{width:min(640px,96vw);background:#fff;border-radius:34px;padding:34px;box-shadow:0 25px 60px rgba(15,23,42,.15);border:1px solid #e5edf7}.logo{width:90px;height:90px;border-radius:28px;background:linear-gradient(135deg,#10b981,#047857);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:white;font-size:44px;font-weight:900}.title{text-align:center;font-size:38px;margin:0;font-weight:900}.sub{text-align:center;color:#6b7280;font-size:18px;margin:10px 0 24px}.roles{display:grid;grid-template-columns:1fr 1fr;gap:14px}.role-btn{height:62px;border:1px solid #dbe3ee;border-radius:22px;background:white;font-size:24px;font-weight:900}.role-btn.active{background:linear-gradient(135deg,#10b981,#047857);color:#fff;box-shadow:0 14px 24px rgba(16,185,129,.25)}label{display:block;font-weight:900;margin:16px 0 8px}input{width:100%;height:58px;border:0;background:#f8fafc;border-radius:18px;padding:0 18px;font-size:18px}.btn{width:100%;height:64px;border:0;border-radius:22px;background:linear-gradient(135deg,#10b981,#047857);color:#fff;font-size:24px;font-weight:900;margin-top:20px}.ghost{background:white;color:#111;border:1px solid #e5e7eb}.note{background:#f8fafc;border-radius:18px;padding:16px;margin-top:18px;color:#64748b;line-height:1.8}@media(max-width:600px){.card{padding:24px;border-radius:26px}.title{font-size:32px}.role-btn{font-size:21px}}
</style></head><body><div class="wrap"><div class="card"><div class="logo">👤</div><h1 class="title">تسجيل الدخول</h1><p class="sub" id="hint">أدخل كلمة مرور المدير للمتابعة.</p><input type="hidden" id="role" value="manager"><div class="roles"><button id="btn-employee" class="role-btn" onclick="setRole('employee')">موظف</button><button id="btn-manager" class="role-btn active" onclick="setRole('manager')">مدير</button></div><div id="usernameWrap" style="display:none"><label>اسم المستخدم</label><input id="username" placeholder="اسم المستخدم أو البريد"></div><label>كلمة المرور</label><input id="password" type="password" placeholder="كلمة المرور"><button class="btn" onclick="login()">دخول</button><button class="btn ghost" onclick="reset()">استرداد كلمة المرور بالبريد</button><div class="note">تم حذف أزرار الفترة التجريبية والشراء حاليًا. كلمة مرور المدير الافتراضية: <b>1234</b>. يمكن تغييرها من صفحة الإعدادات.</div></div></div><script>
const APP_KEY='supermarket_pos_ar_v1';
function loadDB(){let raw=localStorage.getItem(APP_KEY);let db=raw?JSON.parse(raw):{};db.settings=db.settings||{storeName:'سوبرماركت',managerPassword:'1234',currency:'₪'};db.employees=db.employees||[{id:'manager',name:'مدير النظام',username:'admin',password:'1234',role:'Admin',permissions:['*'],active:'نشط'}];localStorage.setItem(APP_KEY,JSON.stringify(db));return db}
let DB=loadDB();function setRole(r){document.getElementById('role').value=r;document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));document.getElementById('btn-'+r).classList.add('active');document.getElementById('hint').textContent=r==='manager'?'أدخل كلمة مرور المدير للمتابعة.':'أدخل اسم المستخدم وكلمة المرور للموظف.';document.getElementById('usernameWrap').style.display=r==='employee'?'block':'none'}
function login(){let role=document.getElementById('role').value, pass=document.getElementById('password').value, user=document.getElementById('username').value.trim();if(role==='manager'){if(pass===(DB.settings.managerPassword||'1234')){localStorage.setItem('currentUser',JSON.stringify({id:'manager',name:'مدير النظام',role:'Admin',permissions:['*']}));location.href='لوحة-المتابعة.html'}else alert('كلمة مرور المدير غير صحيحة')}else{let emp=(DB.employees||[]).find(e=>(e.username===user||e.email===user)&&e.password===pass&&e.active!=='غير نشط');if(emp){localStorage.setItem('currentUser',JSON.stringify(emp));location.href='لوحة-المتابعة.html'}else alert('بيانات الموظف غير صحيحة أو الحساب غير نشط')}}
function reset(){alert('النسخة الحالية تجريبية محلية: كلمة مرور المدير الافتراضية 1234 ويمكن تغييرها من الإعدادات.')}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script></body></html>
