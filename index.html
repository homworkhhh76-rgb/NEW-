px;border:1px solid #dbece4;border-radius:22px;background:linear-gradient(180deg,#fff,#f6fbf8);padding:12px}.sales-chart-wrap canvas{width:100%;height:100%;display:block}.stock-unit-pill{display:inline-flex;align-items:center;gap:6px;background:#eef9f2;color:#047857;border-radius:999px;padding:5px 10px;font-weight:900;font-size:12px}.unit-select-inline{min-width:105px!important;height:38px!important;padding:6px 8px!important}.cart-stock-note{font-size:11px;color:#64748b;font-weight:800}.manual-debt-toolbar{margin-top:20px!important;margin-bottom:16px!important}.debt-click-row{cursor:pointer}.debt-click-row:hover td{background:#f2fbf7!important}.smart-modal-back{position:fixed;inset:0;background:rgba(15,23,42,.62);backdrop-filter:blur(7px);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:44px 12px;overflow:auto}.smart-modal{width:min(980px,96vw);background:#fff;border-radius:26px;padding:16px;box-shadow:0 30px 80px rgba(0,0,0,.25)}.smart-modal-head{display:flex;justify-content:space-between;align-items:center;gap:10px;border-bottom:1px solid #e5eee8;padding-bottom:10px;margin-bottom:12px}.smart-modal-head h3{margin:0;font-size:20px;font-weight:950}.scanner .scan-box{width:min(94vw,560px)!important;height:min(58vh,390px)!important;border-width:3px!important}.scanner p{font-weight:900}.scan-line{animation:scan .82s ease-in-out infinite!important}@media(max-width:700px){.sales-chart-wrap{height:230px}.store-logo-side{width:38px;height:38px}.kpi strong{font-size:20px!important}}

</head><body><div class="wrap"><div class="card"><div class="logo"><svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3l7 3v5c0 5-3 8-7 10-4-2-7-5-7-10V6l7-3Z"/><path d="M9.5 12l1.8 1.8L15 10"/></svg></div><h1 class="title">تسجيل الدخول</h1><p class="sub" id="hint">دخول المدير يحتاج مفتاح الشركة وكلمة المرور.</p><input type="hidden" id="role" value="manager"><div class="roles"><button id="btn-employee" class="role-btn" onclick="setRole('employee')">موظف</button><button id="btn-manager" class="role-btn active" onclick="setRole('manager')">مدير</button></div><div id="companyWrap"><label>مفتاح الشركة</label><input id="companyKey" placeholder="SUPER-0001"></div><div id="usernameWrap" style="display:none"><label>اسم المستخدم أو البريد</label><input id="username" placeholder="اسم المستخدم أو البريد"></div><label>كلمة المرور</label><input id="password" type="password" placeholder="كلمة المرور"><button class="btn" onclick="login()">دخول</button><div class="note">أدخل بيانات الدخول الخاصة بالمدير أو الموظف للمتابعة. لا توجد أزرار تجريبية أو شراء في هذه النسخة.</div></div></div><div id="toast" class="toast"></div><script>
const APP_KEY='supermarket_pos_ar_v1';
function loadDB(){let raw=localStorage.getItem(APP_KEY);let db=raw?JSON.parse(raw):{};db.settings={storeName:'كاشير أوسكار',managerPassword:'0000000000@@',companyKey:'SUPER-0001',currency:'₪',forcePasswordChange:true,...(db.settings||{})};db.employees=db.employees||[{id:'manager',name:'مدير النظام',username:'admin',email:'',password:'0000000000@@',role:'Admin',permissions:['*'],active:'نشط'}];db.accounts=db.accounts||[{id:'cash-main',name:'الصندوق الرئيسي',code:'1001',type:'الأصول المتداولة',balance:0,openingBalance:0,active:'نشط'}];localStorage.setItem(APP_KEY,JSON.stringify(db));return db}
let DB=loadDB();document.getElementById('companyKey').value=DB.settings.companyKey||'SUPER-0001';function toast(m){let t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2600)}
function setRole(r){document.getElementById('role').value=r;document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));document.getElementById('btn-'+r).classList.add('active');document.getElementById('hint').textContent=r==='manager'?'دخول المدير يحتاج مفتاح الشركة وكلمة المرور.':'دخول الموظف باسم المستخدم أو البريد وكلمة المرور.';document.getElementById('usernameWrap').style.display=r==='employee'?'block':'none';document.getElementById('companyWrap').style.display=r==='manager'?'block':'none'}
function forceChangeIfNeeded(){if(DB.settings.forcePasswordChange||DB.settings.managerPassword==='0000000000@@'){let p=prompt('يجب تغيير كلمة مرور المدير الآن. اكتب كلمة مرور جديدة:');if(!p||p==='0000000000@@'||p.length<6){toast('كلمة المرور الجديدة غير صالحة');return false}DB.settings.managerPassword=p;DB.settings.forcePasswordChange=false;localStorage.setItem(APP_KEY,JSON.stringify(DB));toast('تم تغيير كلمة المرور');}return true}
function login(){let role=document.getElementById('role').value, pass=document.getElementById('password').value, user=document.getElementById('username').value.trim(), key=document.getElementById('companyKey').value.trim();if(role==='manager'){if(key!==(DB.settings.companyKey||'SUPER-0001'))return toast('مفتاح الشركة غير صحيح');if(pass===(DB.settings.managerPassword||'0000000000@@')){if(!forceChangeIfNeeded())return;localStorage.setItem('currentUser',JSON.stringify({id:'manager',name:'مدير النظام',role:'Admin',permissions:['*']}));location.href='لوحة-المتابعة.html'}else toast('كلمة مرور المدير غير صحيحة')}else{let emp=(DB.employees||[]).find(e=>(e.username===user||e.email===user)&&e.password===pass&&e.active!=='غير نشط');if(emp){localStorage.setItem('currentUser',JSON.stringify(emp));location.href='لوحة-المتابعة.html'}else toast('بيانات الموظف غير صحيحة أو الحساب غير نشط')}}

async function cloudPullBeforeLogin(companyKey){
  if(window.FirebaseBridge && navigator.onLine){
    try{ await window.FirebaseBridge.pullWithKey(companyKey || DB.settings.companyKey || 'SUPER-0001'); DB=loadDB(); }
    catch(e){ console.warn(e); }
  }
}
async function forceChangeIfNeeded(){
  if(DB.settings.forcePasswordChange||DB.settings.managerPassword==='0000000000@@'){
    let p=prompt('يجب تغيير كلمة مرور المدير الآن. اكتب كلمة مرور جديدة:');
    if(!p||p==='0000000000@@'||p.length<6){toast('كلمة المرور الجديدة غير صالحة');return false}
    DB.settings.managerPassword=p;DB.settings.forcePasswordChange=false;DB.lastLocalUpdate=new Date().toISOString();localStorage.setItem(APP_KEY,JSON.stringify(DB));
    if(window.FirebaseBridge && navigator.onLine){ try{ await window.FirebaseBridge.pushWithKey(DB.settings.companyKey||'SUPER-0001'); }catch(e){ console.warn(e); } }
    toast('تم تغيير كلمة المرور وحفظها في فايربيز');
  }
  return true
}
async function login(){
  let role=document.getElementById('role').value, pass=document.getElementById('password').value, user=document.getElementById('username').value.trim(), key=document.getElementById('companyKey').value.trim()||'SUPER-0001';
  if(role==='manager') await cloudPullBeforeLogin(key);
  if(role==='manager'){
    if(key!==(DB.settings.companyKey||'SUPER-0001'))return toast('مفتاح الشركة غير صحيح');
    if(pass===(DB.settings.managerPassword||'0000000000@@')){
      if(!(await forceChangeIfNeeded()))return;
      localStorage.setItem('currentUser',JSON.stringify({id:'manager',name:'مدير النظام',role:'Admin',permissions:['*'],companyKey:key,managerId:'manager'}));
      location.href='لوحة-المتابعة.html'
    }else toast('كلمة مرور المدير غير صحيحة')
  }else{
    const norm=s=>String(s||'').trim().toLowerCase();
    let emp=(DB.employees||[]).find(e=>(norm(e.username)===norm(user)||norm(e.email)===norm(user)||norm(e.name)===norm(user))&&String(e.password||'')===String(pass)&&e.active!=='غير نشط');
    if(emp){localStorage.setItem('currentUser',JSON.stringify({...emp,companyKey:DB.settings.companyKey||key,managerId:'manager'}));location.href='لوحة-المتابعة.html'}else toast('بيانات الموظف غير صحيحة أو الحساب غير نشط')
  }
}

// FINAL LOGIN PATCH: يسحب بيانات الشركة قبل دخول الموظف ويدعم الاسم/البريد/اسم المستخدم مع حفظ كلمة مرور المدير في Firebase
async function finalPullForLogin(key){
  if(window.FirebaseBridge && navigator.onLine){try{await window.FirebaseBridge.pullWithKey(key||document.getElementById('companyKey').value||DB.settings.companyKey||'SUPER-0001');DB=loadDB();}catch(e){console.warn(e)}}
}
async function login(){
  let role=document.getElementById('role').value, pass=String(document.getElementById('password').value||''), user=String(document.getElementById('username').value||'').trim(), key=String(document.getElementById('companyKey').value||DB.settings.companyKey||'SUPER-0001').trim()||'SUPER-0001';
  await finalPullForLogin(key);
  if(role==='manager'){
    if(key!==(DB.settings.companyKey||'SUPER-0001'))return toast('مفتاح الشركة غير صحيح');
    if(pass===(DB.settings.managerPassword||'0000000000@@')){
      if(DB.settings.forcePasswordChange||DB.settings.managerPassword==='0000000000@@'){
        let p=prompt('يجب تغيير كلمة مرور المدير الآن. اكتب كلمة مرور جديدة:');
        if(!p||p==='0000000000@@'||p.length<6)return toast('كلمة المرور الجديدة غير صالحة');
        DB.settings.managerPassword=p;DB.settings.forcePasswordChange=false;DB.lastLocalUpdate=new Date().toISOString();localStorage.setItem(APP_KEY,JSON.stringify(DB));
        if(window.FirebaseBridge&&navigator.onLine){try{await window.FirebaseBridge.pushWithKey(key)}catch(e){console.warn(e)}}
      }
      localStorage.setItem('currentUser',JSON.stringify({id:'manager',name:'مدير النظام',role:'Admin',permissions:['*'],companyKey:key,managerId:'manager'}));location.href='لوحة-المتابعة.html';
    } else toast('كلمة مرور المدير غير صحيحة');
  } else {
    const norm=s=>String(s||'').trim().toLowerCase();
    let emp=(DB.employees||[]).find(e=>(norm(e.username)===norm(user)||norm(e.email)===norm(user)||norm(e.name)===norm(user)) && String(e.password||'')===pass && norm(e.active||'نشط')!=='غير نشط');
    if(emp){localStorage.setItem('currentUser',JSON.stringify({...emp,companyKey:DB.settings.companyKey||key,managerId:'manager'}));location.href='لوحة-المتابعة.html'}
    else toast('بيانات الموظف غير صحيحة أو الحساب غير نشط');
  }
}

  function logoSrc(){const s=(readDB().settings||{});return s.logo||s.storeLogo||s.logoUrl||s.shopLogo||s.siteLogo||s.companyLogo||''}
  function loadLogo(src){return new Promise(res=>{if(!src)return res(null);let done=false,img=new Image();img.crossOrigin='anonymous';img.onload=()=>{if(!done){done=true;res(img)}};img.onerror=()=>{if(!done){done=true;res(null)}};setTimeout(()=>{if(!done){done=true;res(null)}},1800);img.src=src})}
  window.downloadInvoiceImage=async function(id){let rec=arr('sales').find(x=>String(x.id)===String(id)&&!x._deleted);if(!rec)return;try{if(document.fonts&&document.fonts.ready)await document.fonts.ready}catch(e){}const logo=await loadLogo(logoSrc());function draw(includeLogo){let W=900,H=1250,c=document.createElement('canvas'),x=c.getContext('2d');c.width=W;c.height=H;x.fillStyle='#f8fbfa';x.fillRect(0,0,W,H);x.fillStyle='#064e3b';x.fillRect(0,0,W,170);x.fillStyle='#fff';x.textAlign='right';x.font='900 40px Cairo,Arial';let titleX=W-45;if(includeLogo&&logo){try{x.fillStyle='#fff';x.fillRect(45,26,110,110);x.drawImage(logo,55,36,90,90);titleX=W-45}catch(e){}}x.fillStyle='#fff';x.fillText((readDB().settings||{}).storeName||'كاشير أوسكار',titleX,70);x.font='700 22px Cairo,Arial';x.fillText('فاتورة مبيعات',titleX,113);x.fillStyle='#0f172a';x.font='900 28px Cairo,Arial';let y=225;x.fillText('فاتورة: '+(rec.invoiceNo||''),W-55,y);x.font='700 21px Cairo,Arial';x.fillText('العميل: '+(rec.customerName||'زبون نقدي'),W-55,y+42);x.fillText('التاريخ: '+(rec.date||''),W-55,y+80);y=380;x.fillStyle='#eaf8f0';x.fillRect(45,y-40,W-90,50);x.fillStyle='#064e3b';x.font='900 20px Cairo,Arial';['الصنف','الكمية','السعر','المجموع'].forEach((h,i)=>x.fillText(h,[W-70,W-360,W-520,W-700][i],y-10));(rec.items||[]).slice(0,17).forEach((it,i)=>{y+=50;x.fillStyle=i%2?'#fbfefd':'#fff';x.fillRect(45,y-36,W-90,44);x.fillStyle='#10251f';x.font='700 18px Cairo,Arial';x.fillText(String(it.name||'').slice(0,28),W-70,y-9);x.fillText(String(it.qty||0),W-360,y-9);x.fillText(money(it.unitPrice||0),W-520,y-9);x.fillText(money(it.total||0),W-700,y-9)});y=1010;x.fillStyle='#064e3b';x.fillRect(45,y,W-90,160);x.fillStyle='#fff';x.font='900 32px Cairo,Arial';x.fillText('الإجمالي: '+money(rec.total||0),W-70,y+52);x.font='800 24px Cairo,Arial';x.fillText('المدفوع: '+money(rec.paid||0),W-70,y+96);x.fillText('المتبقي: '+money(rec.due||0),W-70,y+132);return c}let c=draw(true),href='';try{href=c.toDataURL('image/png')}catch(e){c=draw(false);href=c.toDataURL('image/png')}let a=document.createElement('a');a.download=(rec.invoiceNo||'invoice')+'.png';a.href=href;a.click()};
  function salesCount(pid){let n=0;applyFilters(arr('sales'),'sales').forEach(s=>(s.items||[]).forEach(i=>{if(String(i.productId)===String(pid))n+=Number(i.qty||0)}));return n}
  const oldShow=window.showProductResults;window.showProductResults=function(q){let el=$('productResults');if(!el){return oldShow&&oldShow.apply(this,arguments)}let text=norm(q),rows=applyFilters(arr('products'),'products');if(text){let l=low(text);rows=rows.filter(p=>low([p.name,p.sku,p.barcode,p.group,p.brand].join(' ')).includes(l))}else{rows=rows.sort((a,b)=>salesCount(b.id)-salesCount(a.id)).slice(0,6)}if(!rows.length){el.innerHTML='<div class="muted">لا نتائج</div>';return}if(!text){el.innerHTML='<div class="popular-strip"><div class="popular-title">الأكثر طلبًا</div><div class="popular-grid">'+rows.map(p=>'<div class="popular-card" onclick="addProductToCart(\''+esc(p.id)+'\')"><b>'+esc(p.name)+'</b><small>'+money(p.salePrice||p.price||0)+'</small></div>').join('')+'</div></div>'}else{el.innerHTML=rows.map(p=>'<div class="product-card" onclick="addProductToCart(\''+esc(p.id)+'\')"><b>'+esc(p.name)+'</b><div class="muted">'+esc(p.sku||p.barcode||'')+'</div><div>'+money(p.salePrice||p.price||0)+' · المخزون: '+Number(p.stockUnits??p.stock??0).toFixed(3).replace(/\.000$/,'')+' وحدة</div></div>').join('')}};
  function paintCustomerCard(){if(!/لوحة-المتابعة/.test(filename()))return;let k=$('custKpi');if(k){k.classList.add('customer-kpi');k.classList.remove('purple-card')}else{let grid=document.querySelector('.kpis');if(grid)grid.insertAdjacentHTML('beforeend','<div id="custKpi" class="kpi color-card customer-kpi"><span>عدد العملاء</span><strong>'+activeRows(arr('customers')).length+'</strong></div>')}}
  window.exportFullBackup=function(){const d=readDB();d.exportedAt=now();const name='نسخة-احتياطية-كاشير-أوسكار-'+new Date().toISOString().slice(0,10)+'.json';const content=JSON.stringify(d,null,2);try{if(window.downloadFile)return downloadFile(content,name,'application/json;charset=utf-8')}catch(e){}let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:'application/json;charset=utf-8'}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),800)};
  window.openBackupImport=function(){let i=$('backupImportFile');if(i)i.click()};
  window.importFullBackup=function(input){let file=input&&input.files&&input.files[0];if(!file)return;let r=new FileReader();r.onload=function(){try{let data=JSON.parse(r.result);if(!data||typeof data!=='object')throw new Error('bad');if(!confirm('سيتم استيراد النسخة الاحتياطية واستبدال البيانات المحلية الحالية. متابعة؟'))return;data.settings={...(readDB().settings||{}),...(data.settings||{})};data.importedAt=now();writeDB(data);saveAndSync();toastMsg('تم استيراد النسخة الاحتياطية');setTimeout(()=>location.reload(),450)}catch(e){toastMsg('ملف النسخة غير صالح')}};r.readAsText(file,'utf-8')};
  function installBackupPanel(){if(filename()!=='الإعدادات.html')return;const main=$('mainCard');if(!main||$('backupPanel'))return;main.insertAdjacentHTML('beforeend','<div class="backup-card" id="backupPanel"><h3>النسخ الاحتياطي</h3><p>تصدير نسخة كاملة من بيانات البرنامج أو استيراد نسخة محفوظة سابقًا.</p><div class="tools"><button type="button" class="btn success" onclick="exportFullBackup()">تصدير نسخة احتياطية</button><button type="button" class="btn ghost" onclick="openBackupImport()">استيراد نسخة احتياطية</button><input id="backupImportFile" type="file" accept="application/json,.json" style="display:none" onchange="importFullBackup(this)"></div></div>')}
  const oldSettings=window.renderSettings;window.renderSettings=function(){let r=oldSettings&&oldSettings.apply(this,arguments);setTimeout(installBackupPanel,0);return r};
  function afterAll(){removeMenuSections();relocateBranchSwitcher();drawBranchList();paintCustomerCard();installBackupPanel();}
  const oldRender=window.renderPage;window.renderPage=function(){let r=oldRender&&oldRender.apply(this,arguments);setTimeout(afterAll,20);return r};
  document.addEventListener('click',e=>{if(!e.target.closest('.branch-switcher'))document.querySelector('.drawer-brand .branch-switcher')?.classList.remove('open')});
  document.addEventListener('DOMContentLoaded',()=>setTimeout(afterAll,180));
  if(document.readyState!=='loading')setTimeout(afterAll,220);
})();
</script>
