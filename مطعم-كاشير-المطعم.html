<body>
<div class="app">
<header class="topbar">
<button class="icon-btn mobile-toggle" onclick="document.getElementById('side').classList.add('open')">☰</button>
<div class="brand"><span class="status-dot"></span><span id="storeName">كاشير أوسكار</span></div>
<span class="pill" id="modeState">وضع المطعم</span>
<a class="icon-btn" href="لوحة-المتابعة.html" title="الرئيسية">⌂</a>
</header>
<div class="layout">
<aside class="side" id="side">
<div class="side-title"><b>Restaurant OS</b><span>نظام إدارة المطاعم المتكامل</span></div>
<nav class="nav" id="nav"></nav>
<button class="btn danger" style="width:100%;margin-top:12px" onclick="document.getElementById('side').classList.remove('open')">إغلاق</button>
</aside>
<main class="content">
<div class="title-row"><div><h1 id="pageTitle">الطاولات</h1><div class="muted">واجهة المطعم منفصلة وسريعة ومتوافقة مع الجوال، وتعمل بدون خلط مع البيع المباشر.</div></div><div class="tools no-print"><button class="btn ghost" onclick="pullLight()">مزامنة</button><button class="btn ghost" onclick="printPage()">طباعة</button></div></div>
<div id="main"></div>
</main>
</div>
<nav class="restaurant-bottom" id="restaurantBottom"></nav>
<div id="modalBack" class="modal-back" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-head"><h3 id="modalTitle">نافذة</h3><button class="btn small danger" onclick="closeModal()">×</button></div><div id="modalBody"></div></div></div>
<div id="toast" class="toast"></div>
</div>
<script>
const APP_KEY='supermarket_pos_ar_v1';
const PAGE_KIND=window.REST_PAGE_KIND||'tables';
const PAGE_TITLE=window.REST_PAGE_TITLE||'المطعم';
const CURRENCY_FALLBACK='₪';
const STATUS={new:'جديد',preparing:'قيد التحضير',ready:'تم التحضير',onway:'في الطريق للطاولة',delivered:'تم التسليم',cancelled:'ملغي'};
const PAY={unpaid:'لم يحاسب',partial:'جزئي',paid:'مدفوع'};
function uid(p='id'){return p+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8)}
function readDB(){try{return JSON.parse(localStorage.getItem(APP_KEY)||'{}')||{}}catch(e){return {}}}
function saveDB(db){localStorage.setItem(APP_KEY,JSON.stringify(db||{}));}
let DB=readDB();
function col(k){if(!Array.isArray(DB[k]))DB[k]=[];return DB[k]}
function settings(){DB.settings=DB.settings||{};return DB.settings}
function money(n){return (Number(n||0)).toFixed(2)+' '+(settings().currency||CURRENCY_FALLBACK)}
function today(){return new Date().toISOString().slice(0,10)}
function now(){return new Date().toLocaleString('ar-EG',{hour12:false})}
function safe(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function toast(msg){let t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2600)}
function syncLight(){saveDB(DB); if(window.FirebaseBridge&&navigator.onLine){clearTimeout(window.__restSyncTimer);window.__restSyncTimer=setTimeout(async()=>{try{DB=await window.FirebaseBridge.sync(DB,{companyKey:settings().companyKey});saveDB(DB)}catch(e){console.warn(e)}},350)}}
async function pullLight(){if(window.FirebaseBridge&&navigator.onLine){try{DB=await window.FirebaseBridge.sync(readDB(),{companyKey:settings().companyKey});saveDB(DB);render()}catch(e){console.warn(e)}}}
function ensureRestaurant(){
  settings().restaurantMode=settings().restaurantMode||'off';
  settings().currency=settings().currency||CURRENCY_FALLBACK;
  if(!col('accounts').length)col('accounts').push({id:'cash-main',name:'الصندوق الرئيسي',code:'1001',type:'الأصول المتداولة',balance:0,openingBalance:0,active:'نشط'});
  if(!col('restaurantTables').length){for(let i=1;i<=10;i++)col('restaurantTables').push({id:'tbl-'+i,name:'طاولة '+i,seats:i<=4?4:6,status:'متاحة',currentOrderId:'',createdAt:new Date().toISOString()});}

function baseURL(){let href=location.href.split('#')[0].split('?')[0];return href.substring(0,href.lastIndexOf('/')+1)}
function tableLink(t){return baseURL()+'مطعم-المنيو-الرقمي.html?table='+encodeURIComponent(t.id)}
function qrURL(t){return 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data='+encodeURIComponent(tableLink(t))}
function tableById(id){return col('restaurantTables').find(t=>t.id===id)}
function dishById(id){return col('restaurantMenu').find(d=>d.id===id)}
function orderById(id){return col('restaurantOrders').find(o=>o.id===id)}
function productByIngredient(ing){let products=col('products');return products.find(p=>p.id&&p.id===ing.productId)||products.find(p=>String(p.name||'').trim()===String(ing.productName||'').trim())}
function num(x){return Number(x||0)||0}
function prodCost(p){return num(p?.purchasePrice||p?.costPrice||p?.cost||p?.buyPrice||p?.unitCost||p?.pricePurchase||0)}
function prodStock(p){return num(p?.stock ?? p?.currentStock ?? p?.quantity ?? p?.qty ?? p?.baseQty ?? 0)}
function setProdStock(p,v){if('stock' in p || !('currentStock' in p)){p.stock=Number(v.toFixed(3))}else p.currentStock=Number(v.toFixed(3));}
function ingredientCost(ing){let p=productByIngredient(ing);let cost=prodCost(p)||num(ing.costOverride);return cost*num(ing.qty)}
function dishCost(d){return (d.recipe||[]).reduce((s,ing)=>s+ingredientCost(ing),0)}
function orderCost(o){return (o.items||[]).reduce((s,it)=>s+dishCost(dishById(it.menuId)||{})*num(it.qty),0)}
function orderTotal(o){return (o.items||[]).reduce((s,it)=>s+num(it.total),0)}
function badge(text,type='dark'){return `<span class="badge ${type}">${text}</span>`}
function statusBadge(s){let type={new:'info',preparing:'warn',ready:'ok',onway:'info',delivered:'dark',cancelled:'bad'}[s]||'dark';return badge(STATUS[s]||s,type)}
function payBadge(s){let type={paid:'ok',partial:'warn',unpaid:'bad'}[s]||'dark';return badge(PAY[s]||s,type)}
function tableBadge(s){let type={'متاحة':'ok','مشغولة':'warn','بانتظار الحساب':'info','تحتاج تنظيف':'bad'}[s]||'dark';return badge(s,type)}
function updateTableFromOrder(o){let t=tableById(o.tableId);if(!t)return; t.currentOrderId=o.id; if(o.status==='delivered'&&o.paymentStatus==='paid')t.status='تحتاج تنظيف'; else if(o.paymentStatus!=='paid'&&['ready','onway','delivered'].includes(o.status))t.status='بانتظار الحساب'; else t.status='مشغولة';}
function deductOrder(o){if(o.inventoryDeducted)return; (o.items||[]).forEach(it=>{let d=dishById(it.menuId);(d?.recipe||[]).forEach(ing=>{let p=productByIngredient(ing);if(!p)return;let before=prodStock(p), q=num(ing.qty)*num(it.qty), after=before-q;setProdStock(p,after);col('restaurantInventoryMovements').unshift({id:uid('rim'),date:now(),type:'خصم طلب مطعم',productId:p.id,productName:p.name||ing.productName,qty:-q,before,after,orderNo:o.no,note:it.name});});});o.inventoryDeducted=true;}
function addMovement(accountId,type,amount,source,note){amount=num(amount);if(!amount)return;let acc=col('accounts').find(a=>a.id===accountId)||col('accounts')[0];if(!acc)return;let before=num(acc.balance);let after=type==='out'?before-amount:before+amount;acc.balance=after;col('accountMovements').unshift({id:uid('mov'),date:now(),accountId:acc.id,accountName:acc.name,type:type==='out'?'خروج':'دخول',amount,balanceBefore:before,balanceAfter:after,source,note});}
function postRestaurantSale(o){let sales=col('sales');let id='sale-rest-'+o.id;let rec=sales.find(s=>s.id===id);let payload={id,invoiceNo:o.no,date:o.date,customerName:o.customerName||'زبون طاولة',branch:'المطعم',paymentMethod:'مطعم',accountId:o.accountId||'',total:o.total,paid:o.paid,due:Math.max(0,o.total-o.paid),items:o.items.map(i=>({name:i.name,qty:i.qty,unitPrice:i.price,total:i.total,sku:'REST'})),source:'restaurant',restaurantOrderId:o.id,createdAt:o.createdAt||new Date().toISOString(),_updatedAt:new Date().toISOString()};if(rec)Object.assign(rec,payload);else sales.unshift(payload);}
function applyPayment(orderId,amount,accountId,method='كاش'){let o=orderById(orderId);if(!o)return;amount=Math.min(num(amount),Math.max(0,num(o.total)-num(o.paid)));if(amount<=0)return toast('لا يوجد مبلغ متبقٍ');o.paid=num(o.paid)+amount;o.accountId=accountId||o.accountId||col('accounts')[0]?.id||'';o.paymentMethod=method;o.paymentStatus=o.paid>=o.total?'paid':'partial';col('restaurantPayments').unshift({id:uid('rpay'),date:now(),orderId:o.id,orderNo:o.no,amount,accountId:o.accountId,method});addMovement(o.accountId,'in',amount,'طلب مطعم '+o.no,'دفعة طاولة '+(o.tableName||''));postRestaurantSale(o);updateTableFromOrder(o);syncLight();render();toast('تم تسجيل الدفعة')}
function releaseTable(tableId){let t=tableById(tableId);if(!t)return;t.status='متاحة';t.currentOrderId='';t.lastClearedAt=now();syncLight();render();toast('تم تفريغ الطاولة')}
function cancelOrder(id){let o=orderById(id);if(!o)return;if(!confirm('إلغاء الطلب؟'))return;o.status='cancelled';let t=tableById(o.tableId);if(t&&t.currentOrderId===id){t.status='متاحة';t.currentOrderId=''}syncLight();render();}
function changeStatus(id,s){let o=orderById(id);if(!o)return;o.status=s;o.updatedAt=new Date().toISOString();updateTableFromOrder(o);postRestaurantSale(o);syncLight();render();}
function accountsOptions(sel=''){let arr=col('accounts');if(!arr.length)arr=[{id:'cash-main',name:'الصندوق الرئيسي'}];return arr.map(a=>`<option value="${safe(a.id)}" ${sel===a.id?'selected':''}>${safe(a.name)}</option>`).join('')}

function renderTables(){let active=col('restaurantOrders').filter(o=>!['delivered','cancelled'].includes(o.status)||o.paymentStatus!=='paid').length;let unpaid=col('restaurantOrders').filter(o=>o.paymentStatus!=='paid'&&o.status!=='cancelled').reduce((s,o)=>s+num(o.total)-num(o.paid),0);let busy=col('restaurantTables').filter(t=>t.status!=='متاحة').length;document.getElementById('main').innerHTML=`<div class="kpis"><div class="kpi"><span>الطاولات المشغولة</span><strong>${busy}</strong></div><div class="kpi"><span>طلبات مفتوحة</span><strong>${active}</strong></div><div class="kpi"><span>غير محاسب</span><strong>${money(unpaid)}</strong></div><div class="kpi"><span>عدد الطاولات</span><strong>${col('restaurantTables').length}</strong></div></div><section class="card"><div class="tools"><button class="btn primary" onclick="openTableForm()">+ إضافة طاولة</button><button class="btn ghost" onclick="pullLight()">تحديث/مزامنة</button><button class="btn ghost" onclick="printPage()">طباعة</button></div></section><div class="tables-grid">${col('restaurantTables').map(tableCard).join('')}</div>`}
function tableCard(t){let o=orderById(t.currentOrderId)||col('restaurantOrders').filter(x=>x.tableId===t.id&&x.status!=='cancelled').sort((a,b)=>String(b.createdAt||'').localeCompare(String(a.createdAt||'')))[0];let cls=t.status==='متاحة'?'free':t.status==='تحتاج تنظيف'?'clean':t.status==='بانتظار الحساب'?'wait':'busy';let due=o?Math.max(0,num(o.total)-num(o.paid)):0;return `<div class="table-card ${cls}"><div class="table-head"><h3>${safe(t.name)}</h3>${tableBadge(t.status||'متاحة')}</div><div class="muted">عدد الكراسي: ${safe(t.seats||'')}</div>${o?`<div style="margin:10px 0">${statusBadge(o.status)} ${payBadge(o.paymentStatus)}</div><div class="price">${money(o.total)}</div><div class="muted">المتبقي: ${money(due)}</div>`:`<div class="muted" style="margin:10px 0">لا يوجد طلب مفتوح</div>`}<div class="grid2" style="align-items:center;margin:12px 0"><img class="qr" src="${qrURL(t)}" alt="QR"><div class="tools"><button class="btn small info" onclick="copyText('${tableLink(t).replace(/'/g,'%27')}')">نسخ الرابط</button><a class="btn small ghost" target="_blank" href="${tableLink(t)}">فتح المنيو</a></div></div><div class="tools">${o?`<button class="btn small primary" onclick="openPayment('${o.id}')">محاسبة</button><button class="btn small warn" onclick="changeStatus('${o.id}','delivered')">تم التسليم</button><button class="btn small danger" onclick="cancelOrder('${o.id}')">إلغاء</button>`:''}<button class="btn small dark" onclick="releaseTable('${t.id}')">الطاولة فضيت</button></div></div>`}
function openTableForm(){openModal('إضافة طاولة',`<form id="tableForm" class="grid"><div class="field"><label>اسم/رقم الطاولة</label><input name="name" required placeholder="طاولة 11"></div><div class="field"><label>عدد الكراسي</label><input name="seats" type="number" value="4"></div><div class="field"><label>الحالة</label><select name="status"><option>متاحة</option><option>مشغولة</option><option>تحتاج تنظيف</option></select></div></form><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="saveTable()">حفظ</button></div>`)}
function saveTable(){let f=new FormData(document.getElementById('tableForm'));col('restaurantTables').push({id:uid('tbl'),name:f.get('name'),seats:f.get('seats'),status:f.get('status'),currentOrderId:'',createdAt:new Date().toISOString()});syncLight();closeModal();render();}
function openPayment(id){let o=orderById(id);let due=Math.max(0,num(o.total)-num(o.paid));openModal('محاسبة '+o.no,`<div class="kpis"><div class="kpi"><span>الإجمالي</span><strong>${money(o.total)}</strong></div><div class="kpi"><span>المدفوع</span><strong>${money(o.paid)}</strong></div><div class="kpi"><span>المتبقي</span><strong>${money(due)}</strong></div><div class="kpi"><span>الطاولة</span><strong>${safe(o.tableName)}</strong></div></div><div class="grid"><div class="field"><label>المبلغ المدفوع الآن</label><input id="payAmount" type="number" value="${due}" step="0.01"></div><div class="field"><label>الحساب</label><select id="payAccount">${accountsOptions(o.accountId)}</select></div><div class="field"><label>طريقة الدفع</label><select id="payMethod"><option>كاش</option><option>بطاقة</option><option>تحويل</option><option>محفظة</option></select></div></div><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="applyPayment('${id}',document.getElementById('payAmount').value,document.getElementById('payAccount').value,document.getElementById('payMethod').value);closeModal()">تسجيل الدفعة</button><button class="btn dark" onclick="releaseTable('${o.tableId}');closeModal()">تم الدفع والطاولة فضيت</button></div>`)}
function renderCashier(){loadCart();let all=col('restaurantMenu').filter(d=>d.active!=='غير نشط');let dishes=filterByCategory(all,'cashier');let total=cart.reduce((s,i)=>s+num(i.total),0);let currentTable=sessionStorage.getItem('cashier_table')||col('restaurantTables')[0]?.id||'';document.getElementById('main').innerHTML=`<div class="cashier-layout"><section><section class="card"><h3>كاشير المطعم</h3><div class="grid"><div class="field"><label>الطاولة</label><select id="cashierTable" onchange="sessionStorage.setItem('cashier_table',this.value)">${tablesOptions(currentTable)}</select></div><div class="field"><label>اسم الزبون اختياري</label><input id="cashierCustomer" placeholder="زبون نقدي"></div><div class="field"><label>رقم الهاتف للولاء</label><input id="cashierPhone" inputmode="tel" placeholder="اختياري"></div><div class="field"><label>ملاحظة عامة</label><input id="cashierNote" placeholder="ملاحظة على الطلب"></div></div></section>${categoryStrip(all,'cashier')}<div class="menu-grid">${dishes.map(dishPublicCard).join('')||'<section class="card"><div class="muted">لا توجد أطباق في هذا القسم</div></section>'}</div></section><aside class="card cashier-cart"><h3>سلة الكاشير</h3>${cart.length?cart.map((i,idx)=>`<div class="cart-line"><span>${safe(i.qty)}× ${safe(i.name)}<div class="muted">${safe((i.extras||[]).join('، '))}</div></span><b>${money(i.total)}</b><button class="btn small danger" onclick="cart.splice(${idx},1);saveCart();render()">حذف</button></div>`).join(''):'<div class="muted">اختر طبقاً لإضافته هنا</div>'}<div class="tools" style="margin-top:12px"><b class="price">${money(total)}</b><button class="btn primary" onclick="submitCashierOrder()" ${cart.length?'':'disabled'}>إرسال للمطبخ</button></div><div class="muted" style="margin-top:8px">يتم خصم مكونات الوصفة وحساب الربح مثل طلبات المنيو.</div></aside></div>`}
function submitCashierOrder(){let tableId=document.getElementById('cashierTable')?.value||col('restaurantTables')[0]?.id||'cashier';if(!cart.length)return toast('السلة فارغة');let t=tableById(tableId)||{id:tableId,name:'كاشير'};let o={id:uid('ord'),no:'R-'+Date.now().toString().slice(-6),createdAt:new Date().toISOString(),date:today(),time:now(),tableId,tableName:t.name||'كاشير',customerName:document.getElementById('cashierCustomer')?.value||'زبون كاشير',customerPhone:document.getElementById('cashierPhone')?.value||'',note:document.getElementById('cashierNote')?.value||'',status:'new',paymentStatus:'unpaid',paid:0,items:cart,total:cart.reduce((s,i)=>s+num(i.total),0),source:'cashier'};o.cost=orderCost(o);deductOrder(o);col('restaurantOrders').unshift(o);let tb=tableById(tableId);if(tb){tb.status='مشغولة';tb.currentOrderId=o.id}cart=[];saveCart();syncLight();render();toast('تم إرسال طلب الكاشير للمطبخ')}
function renderKitchen(){let groups=[['new','طلبات جديدة'],['preparing','قيد التحضير'],['ready','جاهز'],['onway','خرج للطاولة']];let orders=col('restaurantOrders').filter(o=>!['delivered','cancelled'].includes(o.status));document.getElementById('main').innerHTML=`<section class="card"><div class="tools"><button class="btn primary" onclick="pullLight()">تحديث الطلبات</button><a class="btn ghost" href="مطعم-الطاولات.html">فتح الطاولات</a></div></section><div class="kds-board">${groups.map(([st,title])=>`<div class="kds-col"><h3>${title}</h3>${orders.filter(o=>o.status===st).map(orderCard).join('')||'<div class="muted">لا يوجد</div>'}</div>`).join('')}</div>`}

function saveCart(){sessionStorage.setItem(cartKey(),JSON.stringify(cart))}

function categoryNames(){let arr=col('restaurantCategories').filter(c=>c.active!=='غير نشط').map(c=>String(c.name||'').trim()).filter(Boolean);col('restaurantMenu').forEach(d=>{let c=String(d.category||'').trim();if(c&&!arr.includes(c))arr.push(c)});return arr;}
function selectedCategory(scope='menu'){return sessionStorage.getItem('rest_cat_'+scope)||'all'}
function chooseCategory(scope,cat){sessionStorage.setItem('rest_cat_'+scope,cat);render()}
function categoryStrip(dishes,scope='menu'){let cats=categoryNames().filter(c=>dishes.some(d=>(d.category||'')===c));let sel=selectedCategory(scope);return `<div class="cat-strip"><button class="cat-chip ${sel==='all'?'active':''}" onclick="chooseCategory('${scope}','all')">الكل</button>${cats.map(c=>`<button class="cat-chip ${sel===c?'active':''}" onclick="chooseCategory('${scope}','${safe(c).replace(/'/g,'&#39;')}')">${safe(c)}</button>`).join('')}</div>`}
function filterByCategory(dishes,scope='menu'){let sel=selectedCategory(scope);return sel==='all'?dishes:dishes.filter(d=>(d.category||'')===sel)}
function parseExtrasText(text=''){return String(text||'').split('\n').map(x=>x.trim()).filter(Boolean).map(x=>{let [name,...rest]=x.split(':');return {name:(name||'').trim(),price:num(rest.join(':'))}}).filter(x=>x.name)}
function parseRemoveText(text=''){return String(text||'').split('\n').map(x=>x.trim()).filter(Boolean)}
function extraFormRow(e={}){return `<div class="grid mini-row extra-row"><div class="field"><label>اسم الإضافة</label><input class="extraName" value="${safe(e.name||e.n||'')}" placeholder="مثلاً: جبنة إضافية"></div><div class="field"><label>سعر الإضافة</label><input class="extraPrice" type="number" step="0.01" value="${num(e.price||e.p)}" placeholder="0.00"></div><div class="field"><label>إجراء</label><button type="button" class="btn danger" onclick="this.closest('.extra-row').remove()">حذف</button></div></div>`}
function removeFormRow(v=''){return `<div class="grid2 mini-row remove-row"><div class="field"><label>خيار حذف/تخصيص</label><input class="removeName" value="${safe(v)}" placeholder="مثلاً: بدون بصل"></div><div class="field"><label>إجراء</label><button type="button" class="btn danger" onclick="this.closest('.remove-row').remove()">حذف</button></div></div>`}
function addExtraRow(){document.getElementById('extraRows').insertAdjacentHTML('beforeend',extraFormRow({}))}
function addRemoveRow(){document.getElementById('removeRows').insertAdjacentHTML('beforeend',removeFormRow(''))}
function openCategoryForm(id=''){let c=id?col('restaurantCategories').find(x=>x.id===id):{};openModal(id?'تعديل قسم':'إضافة قسم للمنيو',`<form id="catForm" class="grid"><input type="hidden" name="id" value="${safe(id)}"><div class="field"><label>اسم القسم</label><input name="name" required value="${safe(c?.name||'')}" placeholder="مثلاً: مشاوي، مشروبات، حلويات"></div><div class="field"><label>الحالة</label><select name="active"><option ${c?.active!=='غير نشط'?'selected':''}>نشط</option><option ${c?.active==='غير نشط'?'selected':''}>غير نشط</option></select></div><div class="field"><label>ملاحظة إدارية</label><input name="note" value="${safe(c?.note||'')}" placeholder="اختياري"></div></form><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="saveCategoryForm()">حفظ القسم</button></div>`)}
function saveCategoryForm(){let data=Object.fromEntries(new FormData(document.getElementById('catForm')).entries());let arr=col('restaurantCategories');if(data.id){let old=arr.find(x=>x.id===data.id);Object.assign(old,data,{_updatedAt:new Date().toISOString()})}else{data.id=uid('cat');data.createdAt=new Date().toISOString();arr.push(data)}syncLight();closeModal();render();toast('تم حفظ القسم')}
function deleteCategory(id){let c=col('restaurantCategories').find(x=>x.id===id);if(!c)return;if(!confirm('حذف القسم؟ الأطباق ستبقى موجودة.'))return;DB.restaurantCategories=col('restaurantCategories').filter(x=>x.id!==id);syncLight();render()}

function renderMenu(){let tableId=new URLSearchParams(location.search).get('table');if(tableId)return renderPublicMenu(tableId);renderMenuAdmin()}
function renderPublicMenu(tableId){loadCart();let t=tableById(tableId)||{id:tableId,name:'طاولة'};let all=col('restaurantMenu').filter(d=>d.active!=='غير نشط');let dishes=filterByCategory(all,'public');let total=cart.reduce((s,i)=>s+num(i.total),0);let last=sessionStorage.getItem('last_order_'+tableId);let lastOrder=last?orderById(last):null;document.getElementById('main').innerHTML=`<div class="public-hero"><h1 style="margin:0 0 6px">${safe(settings().storeName||'مطعم أوسكار')}</h1><div>أنت تطلب الآن من ${safe(t.name)} — الطلب يصل مباشرة للمطبخ والكاشير.</div></div>${lastOrder?`<section class="card"><h3>تتبع طلبك ${safe(lastOrder.no)}</h3><div class="tools">${statusBadge(lastOrder.status)} ${payBadge(lastOrder.paymentStatus)} <b>${money(lastOrder.total)}</b></div></section>`:''}${categoryStrip(all,'public')}<div class="menu-grid">${dishes.map(dishPublicCard).join('')||'<section class="card"><div class="muted">لا توجد أطباق في هذا القسم</div></section>'}</div><section class="card cart-sticky"><h3>سلة الطلب</h3>${cart.length?cart.map((i,idx)=>`<div class="cart-line"><span>${safe(i.qty)}× ${safe(i.name)}</span><b>${money(i.total)}</b><button class="btn small danger" onclick="cart.splice(${idx},1);saveCart();render()">حذف</button></div>`).join(''):'<div class="muted">السلة فارغة</div>'}<div class="tools" style="margin-top:12px"><b class="price">${money(total)}</b><button class="btn primary" onclick="submitPublicOrder('${safe(tableId)}')" ${cart.length?'':'disabled'}>إرسال الطلب للمطبخ</button></div></section>`}

function dishPublicCard(d){let img=d.image?`<img src="${safe(d.image)}" alt="">`:'🍽️';return `<div class="dish"><div class="dish-img">${img}</div><div class="dish-body"><h3>${safe(d.name)}</h3><div class="muted">${safe(d.desc||d.category||'')}</div><div class="price">${money(d.price)}</div><button class="btn primary" style="width:100%;margin-top:10px" onclick="openDish('${d.id}')">اختيار</button></div></div>`}

function openDish(id){let d=dishById(id);let extras=parseExtrasText(d.extras||'');let removes=parseRemoveText(d.removes||'');let img=d.image?`<img src="${safe(d.image)}">`:'🍽️';openModal(d.name,`<div class="choice-head"><div class="choice-img">${img}</div><div><div class="muted">${safe(d.desc||d.category||'')}</div><div class="price">${money(d.price)}</div><div class="qty-box" style="margin-top:10px"><label style="font-weight:950">الكمية</label><input id="dishQty" type="number" min="1" value="1"></div></div></div><div class="form-section-title">الإضافات</div><div class="option-grid">${extras.map(e=>`<label class="option-card"><span>${safe(e.name)} <b>${money(e.price)}</b></span><input type="checkbox" class="extra" data-name="${safe(e.name)}" data-price="${e.price}"></label>`).join('')||'<div class="muted">لا توجد إضافات لهذا الطبق</div>'}</div><div class="form-section-title">خيارات الحذف / التخصيص</div><div class="option-grid">${removes.map(r=>`<label class="option-card"><span>${safe(r)}</span><input type="checkbox" class="remove" value="${safe(r)}"></label>`).join('')||'<div class="muted">لا توجد خيارات حذف</div>'}</div><div class="field" style="margin-top:12px"><label>ملاحظات الشيف</label><textarea id="chefNote" placeholder="مثلاً: درجة الاستواء، بدون ملح..."></textarea></div><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="addDishToCart('${id}')">إضافة للسلة</button></div>`)}

function addDishToCart(id){let d=dishById(id);let qty=num(document.getElementById('dishQty').value)||1;let extras=[...document.querySelectorAll('.extra:checked')].map(x=>({name:x.dataset.name,price:num(x.dataset.price)}));let removes=[...document.querySelectorAll('.remove:checked')].map(x=>x.value);let extraTotal=extras.reduce((s,e)=>s+e.price,0);cart.push({menuId:id,name:d.name,qty,price:num(d.price)+extraTotal,basePrice:num(d.price),extras:extras.map(e=>e.name),removes,chefNote:document.getElementById('chefNote').value,total:(num(d.price)+extraTotal)*qty});saveCart();closeModal();render();toast('تمت الإضافة للسلة')}
function submitPublicOrder(tableId){let t=tableById(tableId)||{id:tableId,name:'طاولة'};let html=`<div class="grid"><div class="field"><label>اسم الزبون اختياري</label><input id="customerName"></div><div class="field"><label>رقم الهاتف للولاء/التتبع</label><input id="customerPhone" inputmode="tel"></div><div class="field"><label>ملاحظات عامة</label><input id="orderNote"></div></div><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="confirmPublicOrder('${tableId}')">تأكيد وإرسال</button></div>`;openModal('تأكيد الطلب',html)}
function confirmPublicOrder(tableId){let t=tableById(tableId)||{id:tableId,name:'طاولة'};let o={id:uid('ord'),no:'R-'+Date.now().toString().slice(-6),createdAt:new Date().toISOString(),date:today(),time:now(),tableId,tableName:t.name||tableId,customerName:document.getElementById('customerName').value,customerPhone:document.getElementById('customerPhone').value,note:document.getElementById('orderNote').value,status:'new',paymentStatus:'unpaid',paid:0,items:cart,total:cart.reduce((s,i)=>s+num(i.total),0)};o.cost=orderCost(o);deductOrder(o);col('restaurantOrders').unshift(o);let tb=tableById(tableId);if(tb){tb.status='مشغولة';tb.currentOrderId=o.id}if(o.customerPhone){let l=col('restaurantLoyalty').find(x=>x.phone===o.customerPhone)||{id:uid('loy'),phone:o.customerPhone,name:o.customerName,visits:0,total:0};l.visits=num(l.visits)+1;l.total=num(l.total)+o.total;if(!col('restaurantLoyalty').includes(l))col('restaurantLoyalty').push(l)}sessionStorage.setItem('last_order_'+tableId,o.id);cart=[];saveCart();syncLight();closeModal();render();toast('تم إرسال الطلب للمطبخ')}
function renderMenuAdmin(){let dishes=col('restaurantMenu');let cats=col('restaurantCategories');document.getElementById('main').innerHTML=`<section class="card"><div class="tools"><button class="btn primary" onclick="openDishForm()">+ إضافة طبق</button><button class="btn ghost" onclick="openCategoryForm()">+ إضافة قسم</button><a class="btn ghost" href="مطعم-الوصفات-والتكلفة.html">إدارة الوصفات</a></div></section><section class="card"><h3>أقسام المنيو</h3><div class="cat-admin-grid">${cats.map(c=>`<div class="cat-card"><div><b>${safe(c.name)}</b><div class="muted">${safe(c.active||'نشط')}</div></div><div class="tools"><button class="btn small ghost" onclick="openCategoryForm('${c.id}')">تعديل</button><button class="btn small danger" onclick="deleteCategory('${c.id}')">حذف</button></div></div>`).join('')||'<div class="muted">أضف أول قسم للمنيو</div>'}</div></section>${categoryStrip(dishes,'admin')}<div class="menu-grid">${filterByCategory(dishes,'admin').map(d=>`<div class="dish"><div class="dish-img">${d.image?`<img src="${safe(d.image)}">`:'🍽️'}</div><div class="dish-body"><h3>${safe(d.name)}</h3><div class="muted">${safe(d.category||'')}</div><div class="price">${money(d.price)}</div><div class="muted">تكلفة: ${money(dishCost(d))} | هامش: ${num(d.price)?Math.round((num(d.price)-dishCost(d))/num(d.price)*100):0}%</div><div class="tools" style="margin-top:10px"><button class="btn small ghost" onclick="openDishForm('${d.id}')">تعديل</button><button class="btn small danger" onclick="deleteDish('${d.id}')">حذف</button><a class="btn small info" href="مطعم-المنيو-الرقمي.html?preview=${d.id}">معاينة</a></div></div></div>`).join('')||'<section class="card"><div class="muted">لا توجد أطباق في هذا القسم</div></section>'}</div>`}

function openDishForm(id=''){let d=id?dishById(id):{recipe:[]};let recipe=(d.recipe&&d.recipe.length?d.recipe:[{productId:'',productName:'',qty:1,unit:'قطعة',costOverride:0}]);let cats=categoryNames();let catOptions=cats.map(c=>`<option ${d.category===c?'selected':''}>${safe(c)}</option>`).join('');let ex=parseExtrasText(d.extras||'');let rem=parseRemoveText(d.removes||'');openModal(id?'تعديل طبق':'إضافة طبق',`<form id="dishForm" class="grid"><input type="hidden" name="id" value="${safe(id)}"><div class="field"><label>اسم الطبق</label><input name="name" value="${safe(d.name||'')}" required placeholder="مثلاً: وجبة برجر"></div><div class="field"><label>القسم</label><select name="category"><option value="">اختر قسم</option>${catOptions}</select></div><div class="field"><label>قسم جديد عند الحاجة</label><input name="categoryNew" placeholder="اكتب اسم قسم جديد"></div><div class="field"><label>سعر البيع</label><input name="price" type="number" step="0.01" value="${num(d.price)}" placeholder="0.00"></div><div class="field"><label>رابط صورة الطبق</label><input name="image" value="${safe(d.image||'')}" placeholder="https://..."></div><div class="field"><label>الحالة</label><select name="active"><option ${d.active!=='غير نشط'?'selected':''}>نشط</option><option ${d.active==='غير نشط'?'selected':''}>غير نشط</option></select></div><div class="field" style="grid-column:1/-1"><label>وصف الطبق للزبون</label><input name="desc" value="${safe(d.desc||'')}" placeholder="وصف مختصر للمكونات والطعم"></div></form><section class="card"><h3>إضافات الطبق</h3><div id="extraRows">${(ex.length?ex:[{}]).map(e=>extraFormRow(e)).join('')}</div><button class="btn ghost" onclick="addExtraRow()">+ إضافة خيار إضافة</button></section><section class="card"><h3>خيارات الحذف والتخصيص</h3><div id="removeRows">${(rem.length?rem:['']).map(r=>removeFormRow(r)).join('')}</div><button class="btn ghost" onclick="addRemoveRow()">+ إضافة خيار حذف</button></section><section class="card"><h3>مكونات الوصفة</h3><div class="muted" style="margin-bottom:10px">اختر المواد الخام والكمية المستخدمة لكل طبق ليتم حساب التكلفة والربح وخصم المخزون تلقائياً.</div><div id="recipeRows">${recipe.map((r,i)=>recipeRow(r,i)).join('')}</div><button class="btn ghost" onclick="addRecipeRow()">+ مكون</button></section><div class="tools"><button class="btn primary" onclick="saveDishForm()">حفظ الطبق والوصفة</button></div>`)}

function recipeRow(r={},i=0){return `<div class="grid recipe-row" style="margin-bottom:8px"><div class="field"><label>مادة من المخزون</label><select class="ingProduct"><option value="">يدوي</option>${productsOptions(r.productId)}</select></div><div class="field"><label>اسم المادة اليدوي</label><input class="ingName" value="${safe(r.productName||'')}"></div><div class="field"><label>الكمية</label><input class="ingQty" type="number" step="0.001" value="${num(r.qty)||1}"></div><div class="field"><label>الوحدة</label><input class="ingUnit" value="${safe(r.unit||'قطعة')}"></div><div class="field"><label>تكلفة يدوية للوحدة</label><input class="ingCost" type="number" step="0.001" value="${num(r.costOverride)}"></div><div class="field"><label>حذف</label><button class="btn danger" type="button" onclick="this.closest('.recipe-row').remove()">حذف</button></div></div>`}
function addRecipeRow(){document.getElementById('recipeRows').insertAdjacentHTML('beforeend',recipeRow({},Date.now()))}
function saveDishForm(){let f=document.getElementById('dishForm');let data=Object.fromEntries(new FormData(f).entries());data.price=num(data.price);data.category=(data.categoryNew||data.category||'عام').trim();delete data.categoryNew;if(data.category&&!col('restaurantCategories').some(c=>String(c.name).trim()===data.category))col('restaurantCategories').push({id:uid('cat'),name:data.category,active:'نشط',createdAt:new Date().toISOString()});data.extras=[...document.querySelectorAll('.extra-row')].map(r=>{let n=r.querySelector('.extraName').value.trim(),p=num(r.querySelector('.extraPrice').value);return n?`${n}:${p}`:''}).filter(Boolean).join('\n');data.removes=[...document.querySelectorAll('.remove-row')].map(r=>r.querySelector('.removeName').value.trim()).filter(Boolean).join('\n');data.recipe=[...document.querySelectorAll('.recipe-row')].map(r=>{let pid=r.querySelector('.ingProduct').value;let p=col('products').find(x=>x.id===pid);return {productId:pid,productName:r.querySelector('.ingName').value||p?.name||'',qty:num(r.querySelector('.ingQty').value),unit:r.querySelector('.ingUnit').value,costOverride:num(r.querySelector('.ingCost').value)}}).filter(x=>x.productId||x.productName);let arr=col('restaurantMenu');if(data.id){let old=arr.find(x=>x.id===data.id);Object.assign(old,data,{_updatedAt:new Date().toISOString()})}else{data.id=uid('dish');data.createdAt=new Date().toISOString();arr.unshift(data)}syncLight();closeModal();render();toast('تم حفظ الطبق')}

function deleteDish(id){if(!confirm('حذف الطبق؟'))return;DB.restaurantMenu=col('restaurantMenu').filter(d=>d.id!==id);syncLight();render()}
function renderRecipes(){let dishes=col('restaurantMenu');document.getElementById('main').innerHTML=`<section class="card"><div class="tools"><button class="btn primary" onclick="openDishForm()">+ طبق/وصفة جديدة</button><a class="btn ghost" href="مطعم-مخزون-المطعم.html">مخزون المواد الخام</a></div></section><div class="table-wrap"><table class="data-table"><thead><tr><th>الطبق</th><th>القسم</th><th>سعر البيع</th><th>تكلفة المكونات</th><th>هامش الربح</th><th>المكونات</th><th>إجراءات</th></tr></thead><tbody>${dishes.map(d=>{let c=dishCost(d),m=num(d.price)-c,p=num(d.price)?Math.round(m/num(d.price)*100):0;return `<tr><td>${safe(d.name)}</td><td>${safe(d.category||'')}</td><td>${money(d.price)}</td><td>${money(c)}</td><td>${money(m)} (${p}%)</td><td>${(d.recipe||[]).map(i=>safe((i.productName||'مادة')+' '+i.qty+' '+i.unit)).join('<br>')}</td><td><button class="btn small ghost" onclick="openDishForm('${d.id}')">تعديل</button></td></tr>`}).join('')}</tbody></table></div>`}
function renderInventory(){let products=col('products');let alerts=products.filter(p=>prodStock(p)<=num(p.reorderPoint||p.alertQty||p.minStock));let waste=col('restaurantWastage').reduce((s,w)=>s+num(w.cost),0);document.getElementById('main').innerHTML=`<div class="kpis"><div class="kpi"><span>مواد تحت حد الطلب</span><strong>${alerts.length}</strong></div><div class="kpi"><span>قيمة الهالك</span><strong>${money(waste)}</strong></div><div class="kpi"><span>عدد المواد</span><strong>${products.length}</strong></div><div class="kpi"><span>حركات مطبخ</span><strong>${col('restaurantInventoryMovements').length}</strong></div></div><section class="card"><h3>إضافة مادة خام للمطعم</h3><div class="grid"><div class="field"><label>اسم المادة</label><input id="rawName" placeholder="مثلاً: دجاج، جبنة، طحين"></div><div class="field"><label>الكمية الحالية</label><input id="rawQty" type="number" step="0.001" value="0"></div><div class="field"><label>الوحدة</label><input id="rawUnit" value="كجم" placeholder="كجم، لتر، قطعة"></div><div class="field"><label>تكلفة الوحدة</label><input id="rawCost" type="number" step="0.001" value="0"></div><div class="field"><label>حد الطلب</label><input id="rawReorder" type="number" step="0.001" value="0"></div></div><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="saveRawMaterial()">حفظ المادة الخام</button></div></section><section class="card"><h3>تسجيل هالك / تالف</h3><div class="grid"><div class="field"><label>المادة</label><select id="wProduct">${productsOptions()}</select></div><div class="field"><label>الكمية</label><input id="wQty" type="number" step="0.001" value="1"></div><div class="field"><label>السبب</label><input id="wReason" placeholder="انتهاء، تلف، خطأ تحضير..."></div></div><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="saveWastage()">حفظ الهالك وخصمه</button></div></section><section class="card"><h3>بطاقات المواد الخام</h3><div class="inventory-cards">${products.map(p=>`<div class="material-card"><b>${safe(p.name||p.sku||p.id)}</b><div class="qty">${prodStock(p)} ${safe(p.unit||p.baseUnit||'')}</div><div class="muted">تكلفة الوحدة: ${money(prodCost(p))}</div><div class="muted">حد الطلب: <input style="width:90px;min-height:32px;padding:5px 8px" type="number" value="${num(p.reorderPoint||p.alertQty||0)}" onchange="setReorder('${p.id}',this.value)"></div><div style="margin-top:8px">${prodStock(p)<=num(p.reorderPoint||p.alertQty||0)?badge('تنبيه طلب','bad'):badge('آمن','ok')}</div></div>`).join('')||`<div class="muted">أضف المواد الخام لتظهر هنا</div>`}</div></section><div class="table-wrap"><table class="data-table"><thead><tr><th>المادة</th><th>المخزون الحالي</th><th>حد الطلب</th><th>تكلفة الوحدة</th><th>الحالة</th></tr></thead><tbody>${products.map(p=>`<tr><td>${safe(p.name||p.sku||p.id)}</td><td>${prodStock(p)}</td><td><input style="width:90px" type="number" value="${num(p.reorderPoint||p.alertQty||0)}" onchange="setReorder('${p.id}',this.value)"></td><td>${money(prodCost(p))}</td><td>${prodStock(p)<=num(p.reorderPoint||p.alertQty||0)?badge('تنبيه طلب','bad'):badge('آمن','ok')}</td></tr>`).join('')||`<tr><td colspan="5" style="text-align:center" class="muted">أضف المواد الخام ليظهر مخزون المطعم هنا</td></tr>`}</tbody></table></div>`}
function saveRawMaterial(){let name=document.getElementById('rawName').value.trim();if(!name)return toast('اكتب اسم المادة');let qty=num(document.getElementById('rawQty').value),unit=document.getElementById('rawUnit').value.trim()||'وحدة',cost=num(document.getElementById('rawCost').value),reorder=num(document.getElementById('rawReorder').value);let p={id:uid('prod'),name,unit,stock:qty,currentStock:qty,purchasePrice:cost,costPrice:cost,reorderPoint:reorder,isRestaurantRaw:true,createdAt:new Date().toISOString()};col('products').unshift(p);col('restaurantInventoryMovements').unshift({id:uid('rim'),date:now(),type:'إضافة مادة خام',productId:p.id,productName:name,qty,unit,before:0,after:qty,cost:cost*qty,note:'إدخال من مخزون المطعم'});syncLight();render();toast('تم حفظ المادة الخام')}

function setReorder(id,v){let p=col('products').find(x=>x.id===id);if(p){p.reorderPoint=num(v);syncLight();}}
function saveWastage(){let id=document.getElementById('wProduct').value,p=col('products').find(x=>x.id===id);if(!p)return toast('اختر مادة');let q=num(document.getElementById('wQty').value),before=prodStock(p),after=before-q;setProdStock(p,after);let cost=prodCost(p)*q;col('restaurantWastage').unshift({id:uid('wst'),date:now(),productId:p.id,productName:p.name,qty:q,cost,reason:document.getElementById('wReason').value});col('restaurantInventoryMovements').unshift({id:uid('rim'),date:now(),type:'هالك مطعم',productId:p.id,productName:p.name,qty:-q,before,after,note:document.getElementById('wReason').value});syncLight();render();toast('تم خصم الهالك من المخزون والأرباح')}
function renderReservations(){document.getElementById('main').innerHTML=`<section class="card"><h3>حجز طاولة</h3><div class="grid"><div class="field"><label>اسم الزبون</label><input id="resName"></div><div class="field"><label>الهاتف</label><input id="resPhone"></div><div class="field"><label>الطاولة</label><select id="resTable">${tablesOptions()}</select></div><div class="field"><label>التاريخ</label><input id="resDate" type="date" value="${today()}"></div><div class="field"><label>الوقت</label><input id="resTime" type="time"></div><div class="field"><label>عدد الأشخاص</label><input id="resGuests" type="number" value="2"></div><div class="field"><label>ملاحظات</label><input id="resNote"></div></div><div class="tools" style="margin-top:12px"><button class="btn primary" onclick="saveReservation()">حفظ الحجز</button></div></section><div class="table-wrap"><table class="data-table"><thead><tr><th>التاريخ</th><th>الوقت</th><th>الطاولة</th><th>الزبون</th><th>الهاتف</th><th>الأشخاص</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>${col('restaurantReservations').map(r=>`<tr><td>${safe(r.date)}</td><td>${safe(r.time)}</td><td>${safe(r.tableName)}</td><td>${safe(r.name)}</td><td>${safe(r.phone)}</td><td>${safe(r.guests)}</td><td>${badge(r.status||'محجوز','info')}</td><td><button class="btn small primary" onclick="markReservation('${r.id}','حضر')">حضر</button><button class="btn small danger" onclick="markReservation('${r.id}','ملغي')">إلغاء</button></td></tr>`).join('')||'<tr><td colspan="8" style="text-align:center" class="muted">لا توجد حجوزات</td></tr>'}</tbody></table></div>`}
function saveReservation(){let t=tableById(document.getElementById('resTable').value)||{};col('restaurantReservations').unshift({id:uid('res'),createdAt:new Date().toISOString(),name:document.getElementById('resName').value,phone:document.getElementById('resPhone').value,tableId:t.id,tableName:t.name,date:document.getElementById('resDate').value,time:document.getElementById('resTime').value,guests:document.getElementById('resGuests').value,note:document.getElementById('resNote').value,status:'محجوز'});syncLight();render();}
function markReservation(id,status){let r=col('restaurantReservations').find(x=>x.id===id);if(r){r.status=status;syncLight();render();}}
function renderAnalytics(){let orders=col('restaurantOrders').filter(o=>o.status!=='cancelled'),sales=orders.reduce((s,o)=>s+num(o.total),0),paid=orders.reduce((s,o)=>s+num(o.paid),0),cost=orders.reduce((s,o)=>s+(num(o.cost)||orderCost(o)),0),waste=col('restaurantWastage').reduce((s,w)=>s+num(w.cost),0),expenses=col('expenses').reduce((s,e)=>s+num(e.amount||e.paid),0),net=sales-cost-waste-expenses;let rows={};orders.forEach(o=>(o.items||[]).forEach(i=>{let r=rows[i.menuId]||(rows[i.menuId]={name:i.name,qty:0,sales:0,cost:0});r.qty+=num(i.qty);r.sales+=num(i.total);r.cost+=dishCost(dishById(i.menuId)||{})*num(i.qty)}));let list=Object.values(rows).map(r=>({...r,profit:r.sales-r.cost,margin:r.sales?Math.round((r.sales-r.cost)/r.sales*100):0})).sort((a,b)=>b.profit-a.profit);document.getElementById('main').innerHTML=`<div class="kpis"><div class="kpi"><span>مبيعات المطعم</span><strong>${money(sales)}</strong></div><div class="kpi"><span>تكلفة المكونات</span><strong>${money(cost)}</strong></div><div class="kpi"><span>الهالك + المصاريف</span><strong>${money(waste+expenses)}</strong></div><div class="kpi"><span>صافي الربح</span><strong>${money(net)}</strong></div></div><section class="card"><h3>معادلة الربح</h3><div class="muted">سعر البيع - تكلفة المكونات - المصاريف التشغيلية - الهالك = صافي الربح</div><div class="bar" style="margin-top:12px"><i style="width:${Math.max(2,Math.min(100,(net/Math.max(sales,1))*100))}%"></i></div></section><section class="card"><h3>الأطباق الأكثر ربحية Menu Engineering</h3><div class="table-wrap"><table class="data-table"><thead><tr><th>الطبق</th><th>الكمية</th><th>المبيعات</th><th>التكلفة</th><th>الربح</th><th>الهامش</th></tr></thead><tbody>${list.map(r=>`<tr><td>${safe(r.name)}</td><td>${r.qty}</td><td>${money(r.sales)}</td><td>${money(r.cost)}</td><td>${money(r.profit)}</td><td>${r.margin}%</td></tr>`).join('')||'<tr><td colspan="6" style="text-align:center" class="muted">لا توجد طلبات بعد</td></tr>'}</tbody></table></div></section>`}
document.addEventListener('DOMContentLoaded',()=>{render();setInterval(()=>{let newer=readDB(); if(JSON.stringify(newer.restaurantOrders)!==JSON.stringify(DB.restaurantOrders)){DB=newer;render()}},2500);setTimeout(pullLight,900);});
</script>
