<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>سجل الواردات</title><script src="oskar-core-fix.js"></script></head><body><main style="font-family:Arial;padding:15px"><h2>سجل الواردات</h2><table border="1" width="100%"><thead><tr><th>التاريخ</th><th>الصنف</th><th>الكمية</th><th>الإجمالي</th></tr></thead><tbody id="tb"></tbody></table></main><script>function r(k){try{return JSON.parse(localStorage.getItem(k)||localStorage.getItem('oskar_'+k)||'[]')}catch(e){return[]}}tb.innerHTML=r('imports').map(x=>`<tr><td>${new Date(x.date).toLocaleString('ar')}</td><td>${x.productName||''}</td><td>${x.quantityUnits||0}</td><td>${x.totalCost||0}</td></tr>`).join('')</script></body></html>
